<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedClear — medication reminders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EAF3FB;
    --surface:#FFFFFF;
    --primary:#1B5FA8;
    --primary-dark:#0E3F73;
    --primary-light:#DCEEFB;
    --chip-bg:#EAF4FC;
    --text:#16263B;
    --text-secondary:#52708A;
    --border:#D3E6F7;
    --warn-bg:#FBEFD9;
    --warn-fg:#8A5A0B;
    --good-bg:#E1F3EA;
    --good-fg:#1F6B49;
    --scale:1;
    --font-family:'Atkinson Hyperlegible', Arial, sans-serif;
    --sp-1:4px;
    --sp-2:8px;
    --sp-3:12px;
    --sp-4:16px;
    --sp-5:20px;
    --sp-6:24px;
    --sp-7:32px;
    --shadow-sm:0 1px 2px rgba(14,38,59,0.05), 0 1px 1px rgba(14,38,59,0.04);
    --shadow-md:0 1px 2px rgba(14,38,59,0.06), 0 8px 20px rgba(14,63,115,0.08);
    --shadow-lg:0 2px 4px rgba(14,38,59,0.07), 0 24px 48px rgba(14,63,115,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ font-size:calc(15px * var(--scale)); }
  html[data-size="small"]{ --scale:0.9; }
  html[data-size="large"]{ --scale:1.18; }
  html[data-size="xl"]{ --scale:1.36; }
  body{
    font-family:var(--font-family);
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:var(--sp-7) var(--sp-3) var(--sp-7);
    min-height:100vh;
  }
  .page{display:flex; flex-direction:column; align-items:center; gap:var(--sp-4); width:100%; max-width:420px;}
  .caption{
    font-size:13px; color:var(--text-secondary); text-align:center; max-width:360px; line-height:1.5;
  }
  .phone{
    position:relative;
    width:390px;
    max-width:94vw;
    background:var(--surface);
    border-radius:34px;
    border:1px solid var(--border);
    box-shadow:var(--shadow-lg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:760px;
  }
  .statusbar{
    background:var(--primary);
    color:#fff;
    padding:var(--sp-4) var(--sp-6) var(--sp-4);
    display:flex;
    align-items:center;
    gap:var(--sp-3);
  }
  .statusbar .logo{
    width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,0.18);
    display:flex;align-items:center;justify-content:center;
  }
  .statusbar h1{font-size:1.05rem; margin:0; font-weight:700; letter-spacing:0.2px;}
  .statusbar .sub{font-size:0.72rem; opacity:0.85; margin:0;}
  .screen{
    flex:1;
    overflow-y:auto;
    padding:var(--sp-4) var(--sp-4) var(--sp-3);
    background:var(--bg);
    position:relative;
  }
  .screen::-webkit-scrollbar{width:0;}
  .tabbar{
    display:flex;
    border-top:1px solid var(--border);
    background:var(--surface);
  }
  .tabbtn{
    flex:1;
    border:none;
    background:none;
    padding:12px 4px 14px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    color:var(--text-secondary);
    font-family:inherit;
    font-size:0.74rem;
    font-weight:700;
    cursor:pointer;
  }
  .tabbtn.active{color:var(--primary);}
  .tabbtn svg{width:24px;height:24px;}
  h2.title{font-size:1.32rem; margin:var(--sp-1) 0 var(--sp-1); font-weight:700; color:var(--text);}
  p.lede{font-size:0.92rem; color:var(--text-secondary); margin:0 0 var(--sp-5); line-height:1.5;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:var(--sp-3);
    margin-bottom:var(--sp-3);
    box-shadow:var(--shadow-sm);
  }
  .med-row{display:flex; align-items:flex-start; gap:var(--sp-3);}
  .pill-icon{
    width:46px;height:46px;border-radius:23px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:1rem;
  }
  .med-name{font-size:1.08rem; font-weight:700; margin:0 0 2px;}
  .med-brand{font-size:0.78em; font-weight:400; color:var(--text-secondary);}
  .med-meta{font-size:0.86rem; color:var(--text-secondary); margin:0;}
  .badge{
    display:inline-block; font-size:0.74rem; font-weight:700; padding:3px 10px;
    border-radius:20px; margin-top:7px;
  }
  .badge.due{background:var(--warn-bg); color:var(--warn-fg);}
  .badge.taken{background:var(--good-bg); color:var(--good-fg);}
  .badge.upcoming{background:var(--chip-bg); color:var(--primary-dark);}
  .row-actions{margin-top:var(--sp-2); display:flex; flex-wrap:wrap; gap:var(--sp-2); align-items:center;}
  .btn{
    border:none; border-radius:26px; font-family:inherit; cursor:pointer;
    font-weight:700; font-size:0.95rem; padding:var(--sp-3) var(--sp-5);
    display:inline-flex; align-items:center; justify-content:center; gap:var(--sp-2);
  }
  .btn-primary{background:var(--primary); color:#fff; width:100%; box-shadow:0 1px 2px rgba(14,63,115,0.15), 0 4px 10px rgba(14,63,115,0.16);}
  .btn-primary:active{background:var(--primary-dark);}
  .btn-secondary{background:var(--chip-bg); color:var(--primary-dark); width:100%;}
  .btn-small{padding:9px 16px; font-size:0.85rem; width:auto;}
  .btn-ghost{background:none; color:var(--primary); padding:8px 4px; width:100%; text-decoration:underline;}
  .fab-wrap{position:sticky; bottom:0; padding-top:var(--sp-2); background:linear-gradient(to top, var(--bg) 60%, rgba(234,243,251,0));}
  .field-label{font-size:0.86rem; font-weight:700; color:var(--text); display:block; margin:var(--sp-4) 0 var(--sp-2);}
  input[type="text"], textarea{
    width:100%; border:1px solid var(--border); border-radius:12px;
    padding:12px 13px; font-family:inherit; font-size:0.98rem; color:var(--text);
    background:var(--surface);
  }
  textarea{resize:vertical; min-height:64px;}
  .chip-row{display:flex; flex-wrap:wrap; gap:var(--sp-2); margin-top:var(--sp-2);}
  .chip{
    border:1.5px solid var(--border); background:var(--surface); color:var(--text);
    border-radius:20px; padding:9px 15px; font-family:inherit; font-size:0.86rem;
    font-weight:700; cursor:pointer;
  }
  .chip.selected{background:var(--primary); border-color:var(--primary); color:#fff;}
  .chip.removable{background:var(--chip-bg); border-color:var(--chip-bg); color:var(--primary-dark); display:flex; gap:6px; align-items:center;}
  .photo-frame{
    width:100%; aspect-ratio:4/3; border-radius:16px; background:var(--chip-bg);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    border:1.5px dashed var(--border); margin-bottom:16px;
  }
  .photo-frame img{width:100%; height:100%; object-fit:cover;}
  .notice{
    background:var(--warn-bg); color:var(--warn-fg); border-radius:12px; padding:11px 13px;
    font-size:0.84rem; margin-bottom:14px; line-height:1.4;
  }
  .spin{
    width:42px;height:42px;border-radius:50%;border:4px solid var(--chip-bg);
    border-top-color:var(--primary); animation:sp 0.9s linear infinite; margin:0 auto 18px;
  }
  @keyframes sp{to{transform:rotate(360deg);}}
  .center-pad{padding:var(--sp-7) var(--sp-3); text-align:center;}
  .settings-section{margin-bottom:var(--sp-6);}
  .settings-section h3{font-size:0.95rem; margin:0 0 var(--sp-3);}
  .size-row{display:flex; flex-wrap:wrap; gap:var(--sp-2);}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) 0; border-bottom:1px solid var(--border);}
  .toggle-row:last-child{border-bottom:none;}
  .switch{width:44px; height:26px; border-radius:14px; background:var(--border); position:relative; cursor:pointer; flex:none;}
  .switch.on{background:var(--primary);}
  .switch .knob{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left 0.15s;}
  .switch.on .knob{left:21px;}
  .overlay{
    position:absolute; inset:0; background:rgba(14,38,59,0.45);
    display:flex; align-items:center; justify-content:center; padding:24px; z-index:10;
  }
  .alert-card{
    background:var(--surface); border-radius:22px; padding:26px 22px; text-align:center; width:100%;
  }
  .alert-pill{
    width:64px;height:64px;border-radius:32px; background:var(--primary-light); color:var(--primary-dark);
    display:flex; align-items:center; justify-content:center; margin:0 auto 14px;
  }
  .eyebrow{font-size:0.8rem; font-weight:700; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.6px; margin:0 0 6px;}
  .alert-name{font-size:1.3rem; font-weight:700; margin:0 0 4px;}
  .alert-meta{font-size:0.95rem; color:var(--text-secondary); margin:0 0 20px;}
  .alert-card .btn{margin-bottom:10px;}
  .checkin-banner{
    background:var(--primary-light); border:1px solid var(--border); border-radius:18px;
    padding:14px 15px; margin-bottom:14px; display:flex; gap:12px; align-items:flex-start;
  }
  .checkin-banner .pill-icon{background:var(--surface);}
  .disclaimer{font-size:0.76rem; color:var(--text-secondary); line-height:1.5; margin-top:6px;}
  .chat-area{display:flex; flex-direction:column; gap:var(--sp-2); margin-bottom:var(--sp-4);}
  .bubble-row{display:flex;}
  .bubble-row.user{justify-content:flex-end;}
  .bubble{
    max-width:80%; padding:var(--sp-2) var(--sp-4); border-radius:16px; font-size:0.94rem; line-height:1.45;
    box-shadow:var(--shadow-sm);
  }
  .bubble.assistant{background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px;}
  .bubble.user{background:var(--primary); color:#fff; border-bottom-right-radius:4px; box-shadow:none;}
  .chat-input-row{display:flex; gap:var(--sp-2); align-items:flex-end; position:sticky; bottom:0; background:var(--bg); padding-top:var(--sp-1);}
  .chat-input-row textarea{flex:1; min-height:46px; max-height:90px;}
  .mic-btn{
    flex:none; width:46px; height:46px; border-radius:23px; border:none; cursor:pointer;
    background:var(--chip-bg); color:var(--primary-dark); display:flex; align-items:center; justify-content:center;
  }
  .mic-btn.listening{background:#E24B4A; color:#fff;}
  .send-btn{flex:none; width:46px; height:46px; border-radius:23px; border:none; cursor:pointer; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center;}
  .severity-tag{font-size:0.78rem; font-weight:700; padding:3px 10px; border-radius:20px; display:inline-block; margin-top:6px;}
  .severity-none, .severity-mild{background:var(--good-bg); color:var(--good-fg);}
  .severity-moderate, .severity-severe{background:var(--warn-bg); color:var(--warn-fg);}
  select{
    width:100%; border:1px solid var(--border); border-radius:12px;
    padding:12px 13px; font-family:inherit; font-size:0.98rem; color:var(--text); background:var(--surface);
  }
  .source-tag{font-size:0.72rem; color:var(--text-secondary); margin-top:2px;}
  .doctor-entry{border-bottom:1px solid var(--border); padding:14px 0;}
  .doctor-entry:last-child{border-bottom:none;}
  .doctor-entry .d-date{font-size:0.8rem; color:var(--text-secondary); font-weight:700; margin:0 0 4px;}

  /* Camera viewfinder */
  .camera-wrap{
    position:absolute; inset:0; background:#0b0b0c; z-index:5;
    display:flex; flex-direction:column;
  }
  .camera-wrap video, .camera-wrap .cam-placeholder{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .cam-placeholder{
    background:linear-gradient(160deg,#1c1c1e,#3a3a3c);
    display:flex; align-items:center; justify-content:center;
  }
  .cam-overlay{position:absolute; inset:0; display:flex; flex-direction:column;}
  .cam-close{
    position:absolute; top:18px; right:18px; width:34px; height:34px; border-radius:17px;
    background:rgba(255,255,255,0.18); color:#fff; border:none; font-size:1.1rem; cursor:pointer; z-index:2;
  }
  .cam-caption{
    align-self:center; margin-top:54px; background:rgba(20,20,22,0.7); color:#fff;
    font-size:0.84rem; font-weight:700; padding:9px 16px; border-radius:20px; z-index:2;
  }
  .cam-frame{
    flex:1; margin:18px 36px; border:3px solid rgba(255,255,255,0.85); border-radius:18px;
    display:flex; align-items:flex-start; justify-content:center; z-index:1;
  }
  .cam-controls{
    display:flex; justify-content:center; align-items:center; padding:26px 0 30px; z-index:2;
  }
  .shutter-btn{
    width:70px; height:70px; border-radius:35px; background:#fff; border:5px solid rgba(255,255,255,0.4);
    cursor:pointer;
  }
  .cam-fallback-card{
    position:relative; z-index:2; margin:auto 24px; background:rgba(255,255,255,0.96); border-radius:18px;
    padding:20px; text-align:center;
  }

  /* Alarm-style reminder */
  .alarm-overlay{
    position:absolute; inset:0; background:linear-gradient(160deg, var(--primary-dark), #0a1f33);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:30px; z-index:10; color:#fff;
  }
  .alarm-status{font-size:0.74rem; opacity:0.8; margin-bottom:18px; text-align:center;}
  .alarm-time{font-size:2.6rem; font-weight:700; letter-spacing:1px; margin:0 0 6px;}
  .alarm-name{font-size:1.25rem; font-weight:700; margin:0 0 4px; text-align:center;}
  .alarm-meta{font-size:0.95rem; opacity:0.85; margin:0 0 34px; text-align:center;}
  .alarm-take{
    width:100%; max-width:280px; background:#fff; color:var(--primary-dark); border:none; border-radius:30px;
    padding:16px; font-family:inherit; font-weight:700; font-size:1.02rem; cursor:pointer; margin-bottom:12px;
  }
  .alarm-delay{
    width:100%; max-width:280px; background:rgba(255,255,255,0.14); color:#fff; border:none; border-radius:30px;
    padding:16px; font-family:inherit; font-weight:700; font-size:1.02rem; cursor:pointer;
  }

  /* Theme swatches */
  .swatch-row{display:flex; gap:14px; margin-top:6px;}
  .swatch{
    width:42px; height:42px; border-radius:21px; cursor:pointer; border:3px solid transparent;
    display:flex; align-items:center; justify-content:center;
  }
  .swatch.active{border-color:var(--text);}

  /* Font picker */
  .font-option{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    border:1.5px solid var(--border); border-radius:14px; padding:var(--sp-3) var(--sp-4);
    margin-bottom:var(--sp-2); background:var(--surface); cursor:pointer; text-align:left;
  }
  .font-option.selected{border-color:var(--primary); background:var(--primary-light);}
  .font-option-name{font-size:1.02rem; font-weight:700; margin:0;}
  .font-option-note{font-size:0.78rem; color:var(--text-secondary); margin:2px 0 0;}
  .font-option-check{flex:none; margin-left:var(--sp-3); color:var(--primary);}
  .notif-status{
    font-size:0.82rem; padding:10px 12px; border-radius:12px; margin-bottom:10px; line-height:1.4;
  }
  .notif-status.granted{background:var(--good-bg); color:var(--good-fg);}
  .notif-status.pending{background:var(--chip-bg); color:var(--primary-dark);}
  .notif-status.blocked{background:var(--warn-bg); color:var(--warn-fg);}

  /* Time grouping + history */
  .time-header{font-size:0.85rem; font-weight:700; color:var(--text-secondary); margin:16px 0 8px;}
  .time-header:first-child{margin-top:0;}
  .history-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);}
  .history-row:last-child{border-bottom:none;}
  .history-date{font-size:0.95rem; font-weight:700;}
  .history-frac{font-size:0.85rem; color:var(--text-secondary);}

  /* Pill meter */
  .pill-meter-wrap{margin-top:10px;}
  .pill-meter-toprow{display:flex; align-items:center; gap:7px; margin-bottom:5px;}
  .pill-meter-cute{flex:none; display:flex; align-items:center;}
  .pill-meter-track{flex:1; height:9px; border-radius:6px; background:var(--chip-bg); overflow:hidden;}
  .pill-meter-fill{height:100%; border-radius:6px; background:var(--primary); transition:width 0.25s;}
  .pill-meter-fill.low{background:#D9534F;}
  .pill-meter-label{font-size:0.78rem; color:var(--text-secondary); margin:0; display:flex; align-items:center; flex-wrap:wrap; gap:6px;}
  .badge.refill{background:#FBE3E1; color:#A23B35;}
  .badge.expired{background:#EDEFF2; color:#5C6774;}
  .expired-card{opacity:0.6; filter:grayscale(0.9);}
  .expiry-note{font-size:0.78rem; color:#8A3C1E; background:#FBEFD9; border-radius:10px; padding:8px 10px; margin-top:9px; line-height:1.4;}
  .expiry-line{font-size:0.78rem; color:var(--text-secondary); margin:4px 0 0;}
  .dispenser-log{background:#0F1B24; border-radius:12px; padding:10px 12px; margin-top:6px; max-height:200px; overflow-y:auto;}
  .dispenser-log-row{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.76rem; color:#B9E4D0; padding:3px 0; line-height:1.4; border-bottom:1px solid rgba(255,255,255,0.06);}
  .dispenser-log-row:last-child{border-bottom:none;}
  .dispenser-log-time{color:#7C93A6;}

  /* Medication info (description / category / conditions) */
  .med-info-toggle{margin-top:6px; font-size:0.82rem; text-decoration:underline; color:var(--primary); background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; font-weight:700;}
  .med-info-body{background:var(--chip-bg); border-radius:12px; padding:10px 12px; margin-top:4px;}
  .med-info-category{display:inline-block; font-size:0.74rem; font-weight:700; color:var(--primary-dark); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3px 10px; margin:0 0 7px;}
  .med-info-desc{font-size:0.85rem; color:var(--text); margin:0 0 7px; line-height:1.45;}
  .med-info-conditions{font-size:0.82rem; color:var(--text-secondary); margin:7px 0 0; line-height:1.45;}
  .med-info-recommend{font-size:0.82rem; color:var(--text-secondary); margin:9px 0 0; line-height:1.45;}
  .med-info-recommend-list{font-size:0.82rem; color:var(--text-secondary); margin:2px 0 0; padding-left:20px; line-height:1.5;}

  /* Always-visible medication warnings banner */
  .med-warning-banner{background:var(--warn-bg); border:1px solid #EED9A6; border-radius:12px; padding:10px 12px; margin-top:var(--sp-2);}
  .med-warning-head{display:flex; align-items:center; gap:6px; color:var(--warn-fg); font-weight:700; font-size:0.86rem;}
  .med-warning-head svg{flex:none;}
  .med-warning-list{margin:4px 0 0; padding-left:24px; color:var(--warn-fg); font-size:0.82rem; line-height:1.5;}
</style>
</head>
<body>
<div class="page">
  <div class="phone" id="phone" data-size="standard">
    <div class="statusbar">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="8" width="18" height="9" rx="4.5"/><path d="M9 8v9" stroke="#fff" stroke-width="2"/></svg>
      </div>
      <div>
        <h1>MedClear</h1>
        <p class="sub">Your medication companion</p>
      </div>
    </div>
    <div class="screen" id="screen"></div>
    <div class="tabbar" id="tabbar"></div>
    <div id="overlaySlot"></div>
  </div>
  <p class="caption">This is a clickable prototype. The scan screen uses a real photo of a pill bottle and a real AI call to read the label — try it with your camera or a photo from your library.</p>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">

<script>
var PERSONAL_INFO_FIELDS = ['name', 'dob', 'allergies', 'emergencyContactName', 'emergencyContactPhone', 'doctorName', 'doctorPhone', 'pharmacyName', 'pharmacyPhone'];

var state = {
  view: 'home',
  textSize: 'standard',
  meds: [
    { id: 1, name: 'Lisinopril', dosage: '10 mg', instructions: 'Take one tablet by mouth in the morning.', type: 'scheduled', times: ['08:00'], color: 0, pillsTotal: 30, pillsRemaining: 9, expiryDate: '2026-11-15', boxId: 1,
      brandNames: ['Prinivil', 'Zestril'],
      category: 'ACE inhibitor (blood pressure medication)',
      description: 'Lisinopril relaxes and widens blood vessels, making it easier for the heart to pump blood.',
      conditions: ['High blood pressure (hypertension)', 'Heart failure', 'Protecting the kidneys in diabetes'],

async function readDispenserLoop(reader){
  var buffer = '';
  try {
    while (true){
      var result = await reader.read();
      if (result.done) break;
      buffer += result.value;
      var lines = buffer.split('\n');
      buffer = lines.pop();
      lines.forEach(function(line){
        line = line.trim();
        if (line) logDispenserActivity('Received: ' + line);
      });
    }
  } catch (err){
    // Port was likely closed — nothing to do here.
  }
}

async function connectDispenser(){
  var d = state.dispenser;
  if (!d.supported){
    logDispenserActivity('This browser does not support Web Serial (navigator.serial is missing).');
    return;
  }
  if (window.isSecureContext === false){
    logDispenserActivity('Blocked: this page is not running in a secure context. Open the saved .html file directly rather than through a preview.');
    return;
  }
  if (window.self !== window.top){
    logDispenserActivity('Blocked: this page appears to be inside an iframe/preview. Download the file and open it in its own browser tab.');
    return;
  }
  if (d.connecting || d.connected) return;
  d.connecting = true;
  render();
  try {
    var port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    var encoder = new TextEncoderStream();
    encoder.readable.pipeTo(port.writable);
    var decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    d.port = port;
    d.writer = encoder.writable.getWriter();
    d.reader = decoder.readable.getReader();
    d.connected = true;
    d.connecting = false;
    var info = (port.getInfo && port.getInfo()) || {};
    d.label = info.usbProductId ? ('USB device ' + info.usbProductId) : 'Connected device';
    d.log = [];
    logDispenserActivity('Connected' + (d.label ? (' — ' + d.label) : '') + '.');
    readDispenserLoop(d.reader);
  } catch (err){
    d.connecting = false;
    if (err && err.name === 'NotFoundError'){
      logDispenserActivity('No port was selected. If the device list was empty, check the Arduino is plugged in and its drivers are installed.');
    } else {
      logDispenserActivity('Connection failed: ' + (err && (err.message || err.name) || err));
    }
  }
  render();
}

async function disconnectDispenser(){
  var d = state.dispenser;
  try {
    if (d.reader){
      await d.reader.cancel();
    }
    if (d.writer){
      await d.writer.close();
    }
    if (d.port){
      await d.port.close();
    }
  } catch (err){
    // Ignore close errors — we're tearing the connection down anyway.
  }
  d.port = null;
  d.writer = null;
  d.reader = null;
  d.connected = false;
  d.label = null;
  logDispenserActivity('Disconnected.');
}

async function sendServoCommand(boxId, action){
  var d = state.dispenser;
  if (!d.connected || !d.writer){
    logDispenserActivity('Ignored ' + action + ':' + boxId + ' — dispenser is not connected.');
    alert('The dispenser isn\'t connected yet. Go to Settings to connect it.');
    return false;
  }
  var command = action + ':' + boxId;
  try {
    await d.writer.write(command + '\n');
    logDispenserActivity('Sent: ' + command);
    return true;
  } catch (err){
    logDispenserActivity('Error sending ' + command + ': ' + (err.message || err));
    alert('Could not reach the dispenser: ' + (err.message || err));
    return false;
  }
}

}

function pillMeterHtml(med){
  var total = med.pillsTotal || 0;
  if (total <= 0) return '';
  var remaining = (typeof med.pillsRemaining === 'number') ? med.pillsRemaining : total;
  if (remaining < 0) remaining = 0;
  var expired = isExpired(med);
  var pct = Math.max(0, Math.min(100, Math.round((remaining / total) * 100)));
  var low = !expired && (remaining <= 5 || remaining <= Math.ceil(total * 0.2));
  var dailyUsage = (med.type === 'prn') ? null : (med.times && med.times.length ? med.times.length : 1);
  var daysLeft = (dailyUsage && dailyUsage > 0) ? Math.floor(remaining / dailyUsage) : null;

  var label = remaining + ' of ' + total + ' pills left';
  if (daysLeft !== null){
    label += ' · about ' + daysLeft + (daysLeft === 1 ? ' day' : ' days') + ' left';
  }
  var lowBadge = low ? '<span class="badge refill">Refill soon</span>' : '';
  var c = MED_COLORS[med.color % MED_COLORS.length];
  var iconColor = expired ? '#8A97A6' : c.fg;

  return '<div class="pill-meter-wrap">' +
    '<div class="pill-meter-toprow">' +
      '<span class="pill-meter-cute">'+iconCutePill(30, iconColor, expired)+'</span>' +
      '<div class="pill-meter-track"><div class="pill-meter-fill'+(low?' low':'')+'" style="width:'+pct+'%;"></div></div>' +
    '</div>' +
    '<p class="pill-meter-label">'+label+lowBadge+'</p>' +
  '</div>';
}

function goView(name){
  if (name === 'health') name = 'healthlog';
  if (state.view === 'scan' && name !== 'scan'){
    stopCamera();
  }
  if (name === 'scan'){
    state.photoDataUrl = null;
    state.extracted = null;
    state.scanError = null;
    state.scanErrorDetail = null;
    state.cameraSupported = null;
  }
  state.view = name;
  render();
  if (name === 'scan'){
    startCamera();
  }
}

function renderHome(){
  var entries = buildReminderList();
  var today = todayKey();
  var grouped = {};
  entries.forEach(function(e){
    if (!grouped[e.time]) grouped[e.time] = [];
    grouped[e.time].push(e);
  });
  var times = Object.keys(grouped).sort();
  var rows = times.map(function(t){
    var groupRows = grouped[t].map(function(e){
      var c = MED_COLORS[e.med.color % MED_COLORS.length];
      var key = e.med.id + '_' + e.time + '_' + today;
      var isTaken = !!state.takenLog[key];
      var isDue = !isTaken && e.time <= nowHHMM();
      var expired = isExpired(e.med);
      var badgeClass = expired ? 'expired' : (isTaken ? 'taken' : (isDue ? 'due' : 'upcoming'));
      var badgeText = expired ? 'Expired' : (isTaken ? ('Taken at ' + formatTime(state.takenLog[key])) : (isDue ? 'Due now' : 'Upcoming'));
      var iconColor = expired ? '#8A97A6' : c.fg;
      var iconBg = expired ? '#EDEFF2' : c.bg;
      var actionOrNote = expired
        ? '<p class="expiry-note">This prescription expired '+escapeHtml(expiryLabel(e.med.expiryDate))+'. Please don\'t take it — check with your pharmacist about disposal and a refill.</p>'
        : (isTaken ? '' : '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="markTaken('+e.med.id+',\''+e.time+'\')">Mark as taken</button>' +
            (e.med.boxId ? '<button class="btn btn-secondary btn-small" onclick="openBox('+e.med.id+')">Open box '+e.med.boxId+'</button>' : '') +
          '</div>');
      return '<div class="card'+(expired?' expired-card':'')+'"><div class="med-row">' +
        '<div class="pill-icon" style="background:'+iconBg+';color:'+iconColor+';">'+iconPill(22, iconColor)+'</div>' +
        '<div style="flex:1;">' +
          '<p class="med-name">'+escapeHtml(e.med.name)+brandNameHtml(e.med)+'</p>' +
          '<p class="med-meta">'+escapeHtml(e.med.dosage)+'</p>' +
          '<span class="badge '+badgeClass+'">'+badgeText+'</span>' +
          pillMeterHtml(e.med) +
          (e.med.expiryDate ? '<p class="expiry-line">Expires '+escapeHtml(expiryLabel(e.med.expiryDate))+'</p>' : '') +
          actionOrNote +
          medWarningsHtml(e.med) +
          medInfoHtml(e.med) +
        '</div>' +
      '</div></div>';
    }).join('');
    return '<h3 class="time-header">'+formatTime(t)+'</h3>' + groupRows;
  }).join('');

  if (entries.length === 0){
    rows = '<div class="card center-pad"><p class="lede" style="margin:0;">No scheduled medications yet. Scan one to get started.</p></div>';
  }

  var doneToday = !!state.checkinLog[today];
  var checkinCard;
  if (doneToday){
    var log = state.checkinLog[today];
    checkinCard = '<div class="card"><div class="med-row">' +
      '<div class="pill-icon" style="background:var(--good-bg);color:var(--good-fg);">'+iconPill(22,'#1F6B49')+'</div>' +
      '<div style="flex:1;"><p class="med-name">Daily check-in complete</p>' +
      '<p class="med-meta">'+escapeHtml(log.summary)+'</p>' +
      '<span class="severity-tag severity-'+log.severity+'">'+log.severity.charAt(0).toUpperCase()+log.severity.slice(1)+'</span>' +
      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="openCheckin()">Check in again</button></div>' +
      '</div></div></div>';
  } else {
    checkinCard = '<div class="card"><div class="med-row">' +
      '<div class="pill-icon" style="background:var(--primary-light);color:var(--primary-dark);">'+iconPill(22,'#0E3F73')+'</div>' +
      '<div style="flex:1;"><p class="med-name">Daily check-in</p>' +
      '<p class="med-meta">Not done yet today. Takes about a minute.</p>' +
      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="openCheckin()">Start check-in</button></div>' +
      '</div></div></div>';
  }

  var prnMeds = state.meds.filter(function(m){ return m.type === 'prn'; });
  var prnHtml = '';
  if (prnMeds.length){
    prnHtml += '<h3 style="font-size:0.95rem; margin:18px 0 8px; color:var(--text-secondary);">As-needed medications</h3>';
    prnHtml += prnMeds.map(function(med){
      var c = MED_COLORS[med.color % MED_COLORS.length];
      var doses = getPrnDosesToday(med.id);
      var lastDose = doses.length ? formatTime(doses[doses.length-1]) : null;
      var statusText = doses.length
        ? (doses.length + ' of ' + med.prnMax + ' doses today · last at ' + lastDose)
        : ('0 of ' + med.prnMax + ' doses today');
      var expired = isExpired(med);
      var iconColor = expired ? '#8A97A6' : c.fg;
      var iconBg = expired ? '#EDEFF2' : c.bg;
      var actionOrNote = expired
        ? '<p class="expiry-note">This medication expired '+escapeHtml(expiryLabel(med.expiryDate))+'. Please don\'t take it — check with your pharmacist about disposal and a refill.</p>'
        : '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="logPrnDose('+med.id+')">Log a dose now</button>' +
            (med.boxId ? '<button class="btn btn-secondary btn-small" onclick="openBox('+med.id+')">Open box '+med.boxId+'</button>' : '') +
          '</div>';
      return '<div class="card'+(expired?' expired-card':'')+'"><div class="med-row">' +
        '<div class="pill-icon" style="background:'+iconBg+';color:'+iconColor+';">'+iconPill(22,iconColor)+'</div>' +
        '<div style="flex:1;">' +
          '<p class="med-name">'+escapeHtml(med.name)+brandNameHtml(med)+'</p>' +
          '<p class="med-meta">'+escapeHtml(med.dosage)+' · '+escapeHtml(med.instructions)+'</p>' +
          '<p class="med-meta" style="margin-top:4px;">'+(expired ? 'Expired' : statusText)+'</p>' +
          pillMeterHtml(med) +
          (med.expiryDate ? '<p class="expiry-line">Expires '+escapeHtml(expiryLabel(med.expiryDate))+'</p>' : '') +
          actionOrNote +
          medWarningsHtml(med) +
          medInfoHtml(med) +
        '</div></div></div>';
    }).join('');
  }

  document.getElementById('screen').innerHTML =
    '<h2 class="title">'+greeting()+'</h2>' +
    '<p class="lede">Here is your schedule for today.</p>' +
    checkinCard +
    interactionCheckCardHtml() +
    rows +
    prnHtml +
    '<div class="fab-wrap"><button class="btn btn-primary" onclick="goView(\'scan\')">+ Scan a new medication</button></div>';
}

          '</div>' +

  }
  document.getElementById('screen').innerHTML =

        '<button class="cam-close" onclick="goView(\'home\')">×</button>' +

          (state.cameraSupported ? '<button class="shutter-btn" onclick="captureFromVideo()" aria-label="Take photo"></button>' : '<div class="spin" style="border-color:rgba(255,255,255,0.25); border-top-color:#fff;"></div>') +
        '</div>' +
        '<button class="btn btn-ghost" style="color:#fff; margin-top:4px;" onclick="document.getElementById(\'galleryInput\').click()">Or choose a photo you already have</button>' +
      '</div>' +

  if (mediaStream){
    var v = document.getElementById('cameraPreview');
    if (v) v.srcObject = mediaStream;
  }

function renderAnalyzing(){
  document.getElementById('screen').innerHTML =
    '<div class="center-pad">' +
      '<div class="spin"></div>' +
      '<p class="lede" style="margin:0;">Reading the label…</p>' +
    '</div>';
}

var mediaStream = null;
function startCamera(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    state.cameraSupported = false;
    renderScan();
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream){
    mediaStream = stream;
    state.cameraSupported = true;
    renderScan();
  }).catch(function(){
    state.cameraSupported = false;
    renderScan();
  });
}
function stopCamera(){
  if (mediaStream){
    mediaStream.getTracks().forEach(function(t){ t.stop(); });
    mediaStream = null;
  }
}
function captureFromVideo(){
  var v = document.getElementById('cameraPreview');
  if (!v) return;
  var canvas = document.createElement('canvas');
  canvas.width = v.videoWidth || 480;
  canvas.height = v.videoHeight || 640;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  state.photoDataUrl = dataUrl;
  state.photoMime = 'image/jpeg';
  state.view = 'analyzing';
  render();
  analyzePhoto(dataUrl, 'image/jpeg');
}

function renderConfirm(){
  var ex = state.extracted || { name: '', dosage: '', instructions: '', selectedTimes: [], type: 'scheduled', prnMax: 4, boxId: null, category: '', description: '', conditions: [] };
  if (!ex.type) ex.type = 'scheduled';
  if (!ex.prnMax) ex.prnMax = 4;
  if (!ex.conditions) ex.conditions = [];
  var notice;
  if (state.scanError === 'nokey'){
    notice = '<div class="notice">No Google Gemini API key is set, so the photo couldn\'t be read automatically. Add one in Settings, or just fill in the details below by hand.</div>';
  } else if (state.scanError){
    var detail = state.scanErrorDetail ? (' (' + escapeHtml(state.scanErrorDetail) + ')') : '';
    notice = '<div class="notice">We had trouble reading the label automatically'+detail+'. Please check or fill in the details below.</div>';
  } else {
    notice = '<div class="notice" style="background:var(--good-bg); color:var(--good-fg);">Here is what we found. Please check it over before saving.</div>';
  }

  var chipRow = SCHEDULE_PRESETS.map(function(p){
    var selected = ex.selectedTimes.indexOf(p.time) !== -1;
    return '<button class="chip '+(selected?'selected':'')+'" onclick="toggleTime(\''+p.time+'\')">'+p.label+' · '+formatTime(p.time)+'</button>';
  }).join('');

  var customChips = ex.selectedTimes.filter(function(t){
    return SCHEDULE_PRESETS.findIndex(function(p){return p.time===t;}) === -1;
  }).map(function(t){
    return '<span class="chip removable">'+formatTime(t)+' <span onclick="toggleTime(\''+t+'\')" style="cursor:pointer; font-weight:700;">×</span></span>';
  }).join('');

  var scheduleSection = ex.type === 'prn'
    ? ('<label class="field-label">Maximum doses per day</label>' +
       '<input type="text" id="f-prnmax" value="'+escapeAttr(String(ex.prnMax))+'" inputmode="numeric">' +
       '<p class="disclaimer">We will track how many doses are logged today against this number — the same as what is printed on the label.</p>')
    : ('<label class="field-label">When should we remind you?</label>' +
       '<div class="chip-row">'+chipRow+customChips+'</div>' +
       '<div style="margin-top:12px; display:flex; gap:8px; align-items:center;">' +
         '<input type="time" id="f-customtime" style="flex:1; border:1px solid var(--border); border-radius:12px; padding:10px; font-family:inherit; font-size:0.95rem;">' +
         '<button class="btn btn-secondary btn-small" onclick="addCustomTime()">Add time</button>' +
       '</div>');

  document.getElementById('screen').innerHTML =
    '<h2 class="title">Confirm details</h2>' +
    (state.photoDataUrl ? '<div class="photo-frame"><img src="'+state.photoDataUrl+'" alt="Photo of medication label"></div>' : '') +
    notice +
    '<label class="field-label">Medication name</label>' +
    '<input type="text" id="f-name" value="'+escapeAttr(ex.name)+'">' +
    '<label class="field-label">Dosage / strength</label>' +
    '<input type="text" id="f-dosage" value="'+escapeAttr(ex.dosage)+'">' +
    '<label class="field-label">Instructions</label>' +
    '<textarea id="f-instructions">'+escapeHtml(ex.instructions)+'</textarea>' +
    medInfoSectionHtml(ex) +
    '<label class="field-label">How is this taken?</label>' +
    '<div class="chip-row">' +
      '<button class="chip '+(ex.type==='scheduled'?'selected':'')+'" onclick="setMedType(\'scheduled\')">On a schedule</button>' +
      '<button class="chip '+(ex.type==='prn'?'selected':'')+'" onclick="setMedType(\'prn\')">As needed for pain</button>' +
    '</div>' +
    '<div style="margin-top:6px;"></div>' +
    scheduleSection +
    '<label class="field-label">How many pills does this prescription include?</label>' +
    '<input type="text" id="f-pillstotal" value="'+escapeAttr(ex.pillsTotal ? String(ex.pillsTotal) : '')+'" inputmode="numeric" placeholder="e.g. 30">' +
    '<p class="disclaimer">We\'ll show a little meter on the home screen that counts down as you take doses, and let you know when it\'s time to refill.</p>' +
    '<label class="field-label">Expiration date</label>' +
    '<input type="date" id="f-expiry" value="'+escapeAttr(ex.expiryDate || '')+'">' +

function boxChipRow(selectedBoxId){

  }
  chips += '<button class="chip '+(!selectedBoxId?'selected':'')+'" onclick="setBoxId(null)">No box</button>';
  return chips;
}

function setBoxId(id){

function dispenserSectionHtml(){

  if (!d.supported){
    status = '<div class="notif-status blocked">This browser doesn\'t support connecting to a dispenser. Use Chrome or Edge on a computer.</div>';
    action = '';
  } else if (inFrame){
    status = '<div class="notif-status blocked">This page is running inside a preview frame, which blocks device access. Download the .html file and open it in its own browser tab.</div>';
    action = '';
  } else if (!secure){
    status = '<div class="notif-status blocked">This page isn\'t in a secure context. Open the saved .html file directly.</div>';
    action = '';

    status = '<div class="notif-status granted">Connected'+(d.label ? (' — ' + escapeHtml(d.label)) : '')+'. "Open box" buttons on the home screen will now move the servos.</div>';

    status = '<div class="notif-status pending">Not connected yet.</div>';

  }

  var logHtml = '';

    var rows = d.log.slice().reverse().map(function(entry){

    '<h3>Pill dispenser</h3>' +

function fireNotification(title, body, onClickCallback){
  if (!('Notification' in window)) return false;
  if (Notification.permission !== 'granted') return false;
  try {
    var n = new Notification(title, { body: body });
    n.onclick = function(){
      try { window.focus(); } catch(e){}
      onClickCallback();
      n.close();
    };
    return true;
  } catch(e){
    return false;
  }
}

function requestNotifPermission(){
  if (!('Notification' in window)){
    state.notifPermission = 'unsupported';
    render();
    return;
  }
  Notification.requestPermission().then(function(perm){
    state.notifPermission = perm;
    render();
  });
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, function(c){
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}
function escapeAttr(s){ return escapeHtml(s); }

function markTaken(medId, time){
  var key = medId + '_' + time + '_' + todayKey();
  state.takenLog[key] = nowHHMM();
  var med = state.meds.filter(function(m){ return m.id === medId; })[0];
  if (med && typeof med.pillsRemaining === 'number' && !isExpired(med)){
    med.pillsRemaining = Math.max(0, med.pillsRemaining - 1);
  }
  render();
}

function toggleTime(t){
  var ex = state.extracted;
  var idx = ex.selectedTimes.indexOf(t);
  if (idx === -1) ex.selectedTimes.push(t); else ex.selectedTimes.splice(idx, 1);
  render();
}
function addCustomTime(){

  }

}

function saveMedication(){
  var name = document.getElementById('f-name').value.trim();
  if (!name){
    alert('Please enter the medication name before saving.');
    return;
  }
  var dosage = document.getElementById('f-dosage').value.trim();
  var instructions = document.getElementById('f-instructions').value.trim();
  var type = state.extracted.type || 'scheduled';
  var med = {
    id: state.nextId++,
    name: name,
    dosage: dosage,
    instructions: instructions,
    type: type,
    color: state.meds.length
  };
  if (type === 'prn'){
    var maxEl = document.getElementById('f-prnmax');
    var maxVal = maxEl ? parseInt(maxEl.value, 10) : 4;
    med.prnMax = (maxVal && maxVal > 0) ? maxVal : 4;
    med.times = [];
  } else {
    med.times = state.extracted.selectedTimes.length ? state.extracted.selectedTimes.slice() : ['08:00'];
  }
  var pillsTotalEl = document.getElementById('f-pillstotal');
  var pillsTotalVal = pillsTotalEl ? parseInt(pillsTotalEl.value, 10) : NaN;
  if (pillsTotalVal && pillsTotalVal > 0){
    med.pillsTotal = pillsTotalVal;
    med.pillsRemaining = pillsTotalVal;
  }
  var expiryEl = document.getElementById('f-expiry');
  if (expiryEl && expiryEl.value){
    med.expiryDate = expiryEl.value;
  }
  med.boxId = state.extracted.boxId || null;
  var brandNamesEl = document.getElementById('f-brandnames');
  med.brandNames = brandNamesEl ? brandNamesEl.value.split(',').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  var categoryEl = document.getElementById('f-category');
  var descriptionEl = document.getElementById('f-description');
  var conditionsEl = document.getElementById('f-conditions');
  med.category = categoryEl ? categoryEl.value.trim() : '';
  med.description = descriptionEl ? descriptionEl.value.trim() : '';
  med.conditions = conditionsEl ? conditionsEl.value.split(',').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  var recommendationsEl = document.getElementById('f-recommendations');
  var warningsEl = document.getElementById('f-warnings');
  med.recommendations = recommendationsEl ? recommendationsEl.value.split('\n').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  med.warnings = warningsEl ? warningsEl.value.split('\n').map(function(s){ return s.trim(); }).filter(Boolean) : [];
  state.meds.push(med);
  state.view = 'home';
  render();
}

function sendTestReminder(){
  var med = state.meds.filter(function(m){ return m.type !== 'prn'; })[0];
  if (!med) return;
  var time = med.times[0];
  var sent = fireNotification('MedClear', med.name + ' ' + med.dosage + ' is due now.', function(){
    state.activeAlert = { med: med, time: time, real: true };
    render();
  });
  if (!sent){
    state.activeAlert = { med: med, time: time, real: false };
    render();
  }
}

function resolveAlert(taken){
  var a = state.activeAlert;
  if (taken){
    markTaken(a.med.id, a.time);
  }
  state.activeAlert = null;
  render();
}

function checkReminders(){
  if (state.activeAlert) return;
  var now = nowHHMM();
  var today = todayKey();
  for (var i = 0; i < state.meds.length; i++){
    var med = state.meds[i];
    for (var j = 0; j < med.times.length; j++){
      var t = med.times[j];
      var fireKey = med.id + '_' + t + '_' + today;
      var takenKey = fireKey;
      if (t === now && !state.firedKeys[fireKey] && !state.takenLog[takenKey]){
        state.firedKeys[fireKey] = true;
        (function(med, t){
          var sent = fireNotification('MedClear', med.name + ' ' + med.dosage + ' is due now.', function(){
            state.activeAlert = { med: med, time: t, real: true };
            render();
          });
          if (!sent){
            state.activeAlert = { med: med, time: t, real: false };
            render();
          }
        })(med, t);
        return;
      }
    }
  }
}
setInterval(checkReminders, 15000);

function readFileAsDataUrl(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){ resolve(reader.result); };
    reader.onerror = function(){ reject(new Error('read failed')); };
    reader.readAsDataURL(file);
  });
}

function handleSelectedFile(file){
  if (!file) return;
  stopCamera();
  state.photoMime = file.type || 'image/jpeg';
  readFileAsDataUrl(file).then(function(dataUrl){
    state.photoDataUrl = dataUrl;
    state.view = 'analyzing';
    render();
    return analyzePhoto(dataUrl, state.photoMime);
  }).catch(function(){
    state.scanError = true;
    state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    state.view = 'confirm';
    render();
  });
}

document.getElementById('cameraInput').addEventListener('change', function(e){
  handleSelectedFile(e.target.files[0]);
  e.target.value = '';
});
document.getElementById('galleryInput').addEventListener('change', function(e){
  handleSelectedFile(e.target.files[0]);
  e.target.value = '';
});

function analyzePhoto(dataUrl, mime){
  if (!state.apiKey){
    state.scanError = 'nokey';
    state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    state.view = 'confirm';
    render();
    return Promise.resolve();
  }
  var base64 = dataUrl.split(',')[1];
  var prompt = 'You are looking at a photo of a medication bottle, box, or blister pack. ' +
    'Identify the medication name, the strength or dosage printed on the label, and the dosing ' +
    'instructions (such as how many times a day and any timing notes). Also identify general reference ' +
    'information about this medication: well-known consumer brand names it is sold under (so a layperson ' +
    'can recognize it — for example if the label shows the generic name "Acetaminophen", list brand names ' +
    'like "Tylenol", "Panadol"; if the label already shows a brand name, this can be empty), its drug ' +
    'category/class, a short plain-language description of what it does, the conditions it is commonly used ' +
    'to treat, general recommendations for taking it safely (such as taking it with water or food, or timing ' +
    'around other medications), and important warnings (such as interactions with alcohol, pregnancy/' +
    'breastfeeding precautions, or things not to combine it with). ' +
    'Respond with ONLY a JSON object and nothing else, no markdown fences, in exactly this shape: ' +
    '{"name":"...","dosage":"...","instructions":"...","suggestedTimes":["08:00","20:00"],' +
    '"brandNames":["...","..."],"category":"...","description":"...","conditions":["...","..."],' +
    '"recommendations":["...","..."],"warnings":["...","..."]}. ' +
    'suggestedTimes should be 24-hour HH:MM strings reflecting how many times a day the label says to take it, ' +
    'spaced sensibly through waking hours. brandNames should be a short list (0-3 items) of common brand names, ' +
    'omitting any that are identical to the printed name. category should be a short drug class label (e.g. ' +
    '"ACE inhibitor"). description should be 1-2 plain-language sentences. conditions should be a short list ' +
    '(1-4 items) of conditions or symptoms it is commonly used to treat. recommendations should be a short list ' +
    '(1-3 items) of practical tips for taking it. warnings should be a short list (1-4 items) of important ' +
    'safety warnings, including alcohol and pregnancy/breastfeeding precautions when relevant. If a field is not ' +
    'clearly legible, make your best reasonable guess; if you cannot identify the medication at all, leave these ' +
    'fields empty.';

  return fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: geminiHeaders(),
    body: JSON.stringify({
      contents: [{
        role: 'user',
        parts: [
          { inline_data: { mime_type: mime, data: base64 } },
          { text: prompt }
        ]
      }],
      generationConfig: { maxOutputTokens: 1000, thinkingConfig: { thinkingBudget: 0 } }
    })
  }).then(function(res){
    if (!res.ok){
      return res.json().catch(function(){ return null; }).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      });
    }
    return res.json();
  }).then(function(data){
    var raw = geminiText(data);
    var cleaned = raw.replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (err) { parsed = null; }
    if (!parsed || !parsed.name){
      state.scanError = true;
      state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    } else {
      state.scanError = false;
      state.extracted = {
        name: parsed.name || '',
        dosage: parsed.dosage || '',
        instructions: parsed.instructions || '',
        selectedTimes: Array.isArray(parsed.suggestedTimes) && parsed.suggestedTimes.length ? parsed.suggestedTimes : ['08:00'],
        type: 'scheduled',
        prnMax: 4,
        pillsTotal: '',
        expiryDate: '',
        boxId: null,
        brandNames: Array.isArray(parsed.brandNames) ? parsed.brandNames : [],
        category: parsed.category || '',
        description: parsed.description || '',
        conditions: Array.isArray(parsed.conditions) ? parsed.conditions : [],
        recommendations: Array.isArray(parsed.recommendations) ? parsed.recommendations : [],
        warnings: Array.isArray(parsed.warnings) ? parsed.warnings : []
      };
    }
    state.view = 'confirm';
    render();
  }).catch(function(err){
    console.error('[analyzePhoto]', err);
    state.scanError = true;
    state.scanErrorDetail = (err && err.message) || String(err);
    state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    state.view = 'confirm';
    render();
  });
}

var CHECKIN_SYSTEM_PROMPT = 'You are a warm, patient daily wellness check-in companion inside a medication reminder app for an older adult. ' +
  'Your only job right now is to ask in simple, short, conversational sentences (1-3 sentences per turn, easy to read or hear aloud) whether they are having any pain or discomfort today. ' +
  'If they mention pain, ask at most one or two gentle follow-up questions to get a general sense of where it is and how it feels (mild, moderate, or severe) - keep it conversational, not like a form. ' +
  'Never diagnose, never suggest or name a specific medication, dose, or treatment, and never speculate about a medical cause. ' +
  'You can acknowledge that the app keeps a log of what they share and that it can show their as-needed medication information after the check-in, but you personally should not decide whether they should take anything. ' +
  'If they say they feel fine, respond warmly and briefly. Keep the whole exchange short - usually 2 to 4 of their replies is enough, then gently suggest wrapping up.';

var CHECKIN_SUMMARY_PROMPT = 'Based on the conversation so far, output ONLY a JSON object, no other text, no markdown fences, in exactly this shape: ' +
  '{"severity":"none|mild|moderate|severe","summary":"one short, plain, factual sentence describing what they reported, written in third person for a medical note"}. ' +
  'Base the severity on what they described, defaulting to "none" if they reported no pain or discomfort.';

function getApiMessages(){
  var msgs = state.checkin.messages;
  var idx = -1;
  for (var i = 0; i < msgs.length; i++){ if (msgs[i].role === 'user'){ idx = i; break; } }
  if (idx === -1) return [];
  return msgs.slice(idx).map(function(m){ return { role: m.role, content: m.text }; });
}

function checkInteractions(){
  if (!state.apiKey){
    alert('Add a Google Gemini API key in Settings to check for interactions.');
    return;
  }
  if (state.meds.length < 2){
    state.interactionCheck = { busy: false, results: [], error: null };
    render();
    return;
  }
  state.interactionCheck = { busy: true, results: null, error: null };
  render();
  var list = state.meds.map(function(m, i){
    var line = (i + 1) + '. ' + m.name + (m.dosage ? (' ' + m.dosage) : '');
    if (m.category) line += ' — ' + m.category;
    return line;
  }).join('\n');
  var prompt = 'You are reviewing a patient\'s current medication list for potential drug-drug interactions ' +
    'and therapeutic duplications (for example, two medications from the same drug class). ' +
    'Current medications:\n' + list + '\n\n' +
    'Respond with ONLY a JSON object, no markdown fences, in exactly this shape: ' +
    '{"findings":[{"severity":"mild|moderate|severe","medications":["Med A","Med B"],"summary":"one short sentence explaining the concern"}]}. ' +
    'Only include findings that are real, clinically relevant concerns for this specific list. ' +
    'If there are no notable interactions or duplications among these medications, return {"findings":[]}. ' +
    'This is general reference information only, not a substitute for a pharmacist or physician review.';
  callGemini('', [{ role: 'user', content: prompt }], 700).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    if (!parsed || !Array.isArray(parsed.findings)){
      state.interactionCheck = { busy: false, results: null, error: 'Could not read the response. Please try again.' };
    } else {
      state.interactionCheck = { busy: false, results: parsed.findings, error: null };
    }
    render();
  }).catch(function(err){
    state.interactionCheck = { busy: false, results: null, error: (err && err.message) || 'Something went wrong.' };
    render();
  });
}

function interactionCheckCardHtml(){
  var ic = state.interactionCheck;
  var body;
  if (ic.busy){
    body = '<p class="med-meta">Checking your medications together…</p>';
  } else if (ic.error){
    body = '<div class="notice">'+escapeHtml(ic.error)+'</div>' +
      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="checkInteractions()">Try again</button></div>';
  } else if (ic.results === null){
    body = '<p class="med-meta">Check your current medications together for possible interactions or duplicate drug classes.</p>' +
      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="checkInteractions()">Check for interactions</button></div>';
  } else if (ic.results.length === 0){
    body = '<div class="notif-status granted">No known interactions or duplications found among your current medications.</div>' +
      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="checkInteractions()">Check again</button></div>';
  } else {
    var findingsHtml = ic.results.map(function(f){
      var meds = Array.isArray(f.medications) ? f.medications.join(' + ') : '';
      return '<div class="med-warning-banner" style="margin-top:8px;">' +
        '<div class="med-warning-head">'+warningIconSvg(18)+'<span>'+escapeHtml(meds)+'</span></div>' +
        '<p style="margin:4px 0 0; font-size:0.82rem; color:var(--warn-fg);">'+escapeHtml(f.summary || '')+'</p>' +
      '</div>';
    }).join('');
    body = findingsHtml +
      '<div class="row-actions" style="margin-top:10px;"><button class="btn btn-secondary btn-small" onclick="checkInteractions()">Check again</button></div>';
  }
  return '<div class="card">' +
    '<p class="med-name" style="margin-bottom:4px;">Medication interaction check</p>' +
    body +
    '<p class="disclaimer" style="margin-top:8px;">General reference check generated by AI — not a substitute for a pharmacist or physician review.</p>' +
  '</div>';
}

function lookupMedInfo(){
  var nameEl = document.getElementById('f-name');
  var dosageEl = document.getElementById('f-dosage');
  var name = nameEl ? nameEl.value.trim() : '';
  var dosage = dosageEl ? dosageEl.value.trim() : '';
  if (!name){
    alert('Enter the medication name first.');
    return;
  }
  if (!state.apiKey){
    alert('Add a Google Gemini API key in Settings to look up medication info.');
    return;
  }
  state.medInfoLookupBusy = true;
  render();
  var prompt = 'Provide general reference information about the following medication: ' + name + (dosage ? (' ' + dosage) : '') + '. ' +
    'Respond with ONLY a JSON object, no markdown fences, in exactly this shape: ' +
    '{"brandNames":["...","..."],"category":"...","description":"...","conditions":["...","..."],"recommendations":["...","..."],"warnings":["...","..."]}. ' +
    'brandNames should be a short list (0-3 items) of well-known consumer brand names this medication is sold ' +
    'under, so a layperson can recognize it (for example "Tylenol", "Panadol" for acetaminophen) — omit any ' +
    'identical to the name given above, and leave empty if the name given is already a brand name. ' +
    'category should be a short drug class label (e.g. "ACE inhibitor"). description should be 1-2 plain-language ' +
    'sentences explaining what it does. conditions should be a short list (1-4 items) of conditions or symptoms ' +
    'it is commonly used to treat. recommendations should be a short list (1-3 items) of practical tips for ' +
    'taking it (such as taking it with water or food, or timing around other medications). warnings should be a ' +
    'short list (1-4 items) of important safety warnings, including alcohol and pregnancy/breastfeeding ' +
    'precautions when relevant. This is for general reference only, not medical advice.';
  callGemini('', [{ role: 'user', content: prompt }], 500).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    state.medInfoLookupBusy = false;
    if (!parsed){
      alert('Could not look up medication info just now. Please try again.');
      render();
      return;
    }
    state.extracted.brandNames = Array.isArray(parsed.brandNames) ? parsed.brandNames : [];
    state.extracted.category = parsed.category || '';
    state.extracted.description = parsed.description || '';
    state.extracted.conditions = Array.isArray(parsed.conditions) ? parsed.conditions : [];
    state.extracted.recommendations = Array.isArray(parsed.recommendations) ? parsed.recommendations : [];
    state.extracted.warnings = Array.isArray(parsed.warnings) ? parsed.warnings : [];
    render();
  }).catch(function(err){
    state.medInfoLookupBusy = false;
    alert('Could not look up medication info: ' + ((err && err.message) || err));
    render();
  });
}

function callGemini(system, messages, maxTokens){
  if (!state.apiKey){
    return Promise.reject(new Error('No API key set'));
  }
  var contents = messages.map(function(m){
    return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
  });
  var body = { contents: contents, generationConfig: { maxOutputTokens: maxTokens || 300, thinkingConfig: { thinkingBudget: 0 } } };
  if (system) body.systemInstruction = { parts: [{ text: system }] };
  return fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: geminiHeaders(),
    body: JSON.stringify(body)
  }).then(function(res){
    if (!res.ok){
      return res.json().catch(function(){ return null; }).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      });
    }
    return res.json();
  }).then(function(data){
    return geminiText(data);
  });
}

function openCheckin(isFallback){
  var opening = 'Hi! This is your daily check-in. Are you having any pain or discomfort today?';
  if (isFallback) opening = "(Notifications aren't available in this preview, so this opened directly.) " + opening;
  state.checkin = { messages: [{ role: 'assistant', text: opening }], ended: false, busy: false };
  state.checkinResult = null;
  state.view = 'checkin';
  render();
  speakText(state.checkin.messages[0].text);
}

function sendCheckinMessage(){
  var box = document.getElementById('f-checkin-input');
  var text = box ? box.value.trim() : '';
  if (!text || state.checkin.busy) return;
  state.checkin.messages.push({ role: 'user', text: text });
  if (!state.apiKey){
    state.checkin.messages.push({ role: 'assistant', text: "I can't reply yet — no Google Gemini API key is set. Add one in Settings, or tap \"End check-in\" below to finish without the chat." });
    if (box) box.value = '';
    render();
    return;
  }
  state.checkin.busy = true;
  render();
  callGemini(CHECKIN_SYSTEM_PROMPT, getApiMessages(), 300).then(function(text){
    var reply = text || "Thanks for telling me that.";
    state.checkin.messages.push({ role: 'assistant', text: reply });
    state.checkin.busy = false;
    render();
    speakText(reply);
  }).catch(function(err){
    state.checkin.messages.push({ role: 'assistant', text: "Sorry, I had trouble connecting just now (" + ((err && err.message) || 'unknown error') + "). You can try again, or finish the check-in below." });
    state.checkin.busy = false;
    render();
  });
}

function endCheckin(){
  if (state.checkin.busy) return;
  state.checkin.busy = true;
  render();
  var apiMsgs = getApiMessages();
  if (apiMsgs.length === 0){
    finishCheckin('none', 'No pain or discomfort reported today.');
    return;
  }
  callGemini(CHECKIN_SUMMARY_PROMPT, apiMsgs, 200).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    var severity = (parsed && parsed.severity) || 'mild';
    var summary = (parsed && parsed.summary) || 'Reported some discomfort today.';
    finishCheckin(severity, summary);
  }).catch(function(){
    finishCheckin('mild', 'Reported some discomfort today; could not generate a full summary.');
  });
}

function finishCheckin(severity, summary){
  state.checkin.busy = false;
  state.checkin.ended = true;
  var today = todayKey();
  state.checkinLog[today] = { severity: severity, summary: summary };
  state.healthLog.unshift({ id: Date.now(), dateLabel: todayDateLabel(), severity: severity, text: summary, source: 'checkin' });
  var relevantPrn = severity !== 'none' ? state.meds.filter(function(m){ return m.type === 'prn'; }) : [];
  state.checkinResult = { severity: severity, summary: summary, prnMeds: relevantPrn };
  state.view = 'checkin-result';
  render();
  if (severity !== 'none'){
    speakText("Thanks for sharing that. I've added it to your health notes" + (relevantPrn.length ? ", and I'll show you your as-needed medication details now." : "."));
  } else {
    speakText("Glad to hear it. Have a great day!");
  }
}

function renderCheckin(){
  var bubbles = state.checkin.messages.map(function(m){
    return '<div class="bubble-row '+m.role+'"><div class="bubble '+m.role+'">'+escapeHtml(m.text)+'</div></div>';
  }).join('');
  var micButton = SpeechRecognitionSupported()
    ? ('<button class="mic-btn '+(state.listening?'listening':'')+'" onclick="toggleListening()" aria-label="Speak your answer">' +
       '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0"/><path d="M12 18v3"/></svg></button>')
    : '';
  var noKeyNotice = state.apiKey ? '' : '<div class="notice">No Google Gemini API key is set, so the check-in chat can\'t reply yet. Add one in Settings to enable it.</div>';
  document.getElementById('screen').innerHTML =
    '<h2 class="title">Daily check-in</h2>' +
    '<p class="disclaimer">This is a supportive check-in, not medical care. If this is an emergency, call 911 or your local emergency number.</p>' +
    noKeyNotice +
    '<div class="chat-area" style="margin-top:14px;">'+bubbles+(state.checkin.busy ? '<div class="bubble-row assistant"><div class="bubble assistant">…</div></div>' : '')+'</div>' +
    '<div class="chat-input-row">' +
      micButton +
      '<textarea id="f-checkin-input" placeholder="Type your answer…" onkeydown="if(event.key===\'Enter\' && !event.shiftKey){event.preventDefault(); sendCheckinMessage();}"></textarea>' +
      '<button class="send-btn" onclick="sendCheckinMessage()" aria-label="Send">' +
        '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#fff" stroke-width="2"><path d="M5 12l14-7-5 14-3-6-6-1z"/></svg>' +
      '</button>' +
    '</div>' +
    '<div style="margin-top:8px;"><button class="btn btn-ghost" onclick="endCheckin()">End check-in</button></div>';
}

function renderCheckinResult(){
  var r = state.checkinResult;
  if (!r){ goView('home'); return; }
  var prnHtml = '';
  if (r.prnMeds && r.prnMeds.length){
    prnHtml += '<h3 style="font-size:0.95rem; margin:18px 0 8px; color:var(--text-secondary);">Your as-needed medication</h3>';
    prnHtml += r.prnMeds.map(function(med){
      var c = MED_COLORS[med.color % MED_COLORS.length];
      var doses = getPrnDosesToday(med.id);
      var lastDose = doses.length ? formatTime(doses[doses.length-1]) : null;
      var statusText = doses.length
        ? (doses.length + ' of ' + med.prnMax + ' doses today · last at ' + lastDose)
        : ('0 of ' + med.prnMax + ' doses today');
      return '<div class="card"><div class="med-row">' +
        '<div class="pill-icon" style="background:'+c.bg+';color:'+c.fg+';">'+iconPill(22,c.fg)+'</div>' +
        '<div style="flex:1;">' +
          '<p class="med-name">'+escapeHtml(med.name)+brandNameHtml(med)+'</p>' +
          '<p class="med-meta">'+escapeHtml(med.dosage)+' · '+escapeHtml(med.instructions)+'</p>' +
          '<p class="med-meta" style="margin-top:4px;">'+statusText+'</p>' +
          '<p class="disclaimer">This is based on the instructions saved for this medication — it is your call whether to take it now.</p>' +
          '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="logPrnDose('+med.id+')">I took a dose just now</button></div>' +
        '</div></div></div>';
    }).join('');
  }
  document.getElementById('screen').innerHTML =
    '<h2 class="title">Check-in complete</h2>' +
    '<div class="card"><p class="med-meta" style="margin:0 0 6px;">'+escapeHtml(r.summary)+'</p>' +
      '<span class="severity-tag severity-'+r.severity+'">'+r.severity.charAt(0).toUpperCase()+r.severity.slice(1)+'</span></div>' +
    '<p class="disclaimer">This has been added to your health notes. If anything feels different or gets worse, it is worth telling your doctor or a family member.</p>' +
    prnHtml +
    '<div class="fab-wrap"><button class="btn btn-primary" onclick="goView(\'home\')">Done</button></div>';
}

function toggleAddingNote(){
  state.addingNote = !state.addingNote;
  render();
}
function addManualNote(){
  var text = document.getElementById('f-note-text').value.trim();
  var severity = document.getElementById('f-note-severity').value;
  if (!text) return;
  state.healthLog.unshift({ id: Date.now(), dateLabel: todayDateLabel(), severity: severity, text: text, source: 'manual' });
  state.addingNote = false;
  render();
}

function computeAge(dobStr){
  if (!dobStr) return null;
  var dob = new Date(dobStr + 'T00:00:00');
  if (isNaN(dob.getTime())) return null;
  var today = new Date();
  var age = today.getFullYear() - dob.getFullYear();
  var m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

function personalSummaryCardHtml(){
  var hasAny = PERSONAL_INFO_FIELDS.some(function(key){ return !!state[key === 'name' ? 'userName' : key]; });
  if (!hasAny) return '';
  var age = computeAge(state.dob);
  var rows = [];
  if (state.userName) rows.push(['Name', state.userName]);
  if (state.dob) rows.push(['Date of birth', expiryLabel(state.dob) + (age !== null ? (' (age ' + age + ')') : '')]);
  if (state.allergies) rows.push(['Known allergies', state.allergies]);
  if (state.emergencyContactName || state.emergencyContactPhone) {
    rows.push(['Emergency contact', [state.emergencyContactName, state.emergencyContactPhone].filter(Boolean).join(' · ')]);
  }
  if (state.doctorName || state.doctorPhone) {
    rows.push(['Primary doctor', [state.doctorName, state.doctorPhone].filter(Boolean).join(' · ')]);
  }
  if (state.pharmacyName || state.pharmacyPhone) {
    rows.push(['Pharmacy', [state.pharmacyName, state.pharmacyPhone].filter(Boolean).join(' · ')]);
  }
  var rowsHtml = rows.map(function(r){
    return '<p class="med-meta" style="margin:0 0 4px;"><strong>'+escapeHtml(r[0])+':</strong> '+escapeHtml(r[1])+'</p>';
  }).join('');
  return '<div class="card">' + rowsHtml + '</div>';
}

function renderHealthLog(){
  var noteForm = state.addingNote
    ? ('<div class="card">' +
        '<label class="field-label">What would you like to note?</label>' +
        '<textarea id="f-note-text" placeholder="Describe how you are feeling…"></textarea>' +
        '<label class="field-label">How severe does it feel?</label>' +
        '<select id="f-note-severity"><option value="mild">Mild</option><option value="moderate">Moderate</option><option value="severe">Severe</option></select>' +
        '<div style="height:10px;"></div>' +
        '<button class="btn btn-primary" onclick="addManualNote()">Save note</button>' +
        '<div style="height:8px;"></div>' +
        '<button class="btn btn-ghost" onclick="toggleAddingNote()">Cancel</button>' +
      '</div>')
    : '<button class="btn btn-secondary" onclick="toggleAddingNote()">+ Add a note for your doctor</button>';

  var entries = state.healthLog.map(function(e){
    return '<div class="card"><p class="med-meta" style="margin:0 0 4px;">'+escapeHtml(e.dateLabel)+'</p>' +
      '<p class="med-name" style="font-size:0.98rem;">'+escapeHtml(e.text)+'</p>' +
      '<span class="severity-tag severity-'+e.severity+'">'+e.severity.charAt(0).toUpperCase()+e.severity.slice(1)+'</span> ' +
      '<span class="source-tag">'+(e.source==='checkin' ? 'From daily check-in' : 'Added manually')+'</span>' +
    '</div>';
  }).join('');

  document.getElementById('screen').innerHTML =
    '<h2 class="title">Health</h2>' +
    '<p class="lede">Everything you have reported, in one place — easy to show your doctor or a family member.</p>' +
    personalSummaryCardHtml() +
    noteForm +
    '<div style="height:6px;"></div>' +
    (entries || '<div class="card"><p class="med-meta" style="margin:0;">No notes recorded yet.</p></div>') +
    '<div class="fab-wrap"><button class="btn btn-primary" onclick="window.print()">Print this summary</button></div>';
}

function SpeechRecognitionSupported(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}
var recognition = null;
function toggleListening(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  if (state.listening){
    if (recognition) recognition.stop();
    return;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onstart = function(){ state.listening = true; render(); };
  recognition.onend = function(){ state.listening = false; render(); };
  recognition.onerror = function(){ state.listening = false; render(); };
  recognition.onresult = function(event){
    var transcript = event.results[0][0].transcript;
    var box = document.getElementById('f-checkin-input');
    if (box) box.value = transcript;
  };
  recognition.start();
}

function speakText(text){
  if (!state.voiceEnabled || !('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    window.speechSynthesis.speak(utter);
  } catch (e) { /* speech not available */ }
}

function renderHistory(){
  var entries = buildReminderList();
  var today = todayKey();
  var totalToday = entries.length;
  var takenToday = entries.filter(function(e){
    return !!state.takenLog[e.med.id + '_' + e.time + '_' + today];
  }).length;

  var mockDays = [
    { daysAgo: 1, taken: Math.max(totalToday - 1, 0), total: totalToday || 4 },
    { daysAgo: 2, taken: totalToday || 4, total: totalToday || 4 },
    { daysAgo: 3, taken: Math.max((totalToday || 4) - 2, 0), total: totalToday || 4 },
    { daysAgo: 4, taken: totalToday || 4, total: totalToday || 4 }
  ];

  var rows = '<div class="history-row"><span class="history-date">'+todayDateLabel()+'</span>' +
    '<span class="history-frac">'+takenToday+' of '+totalToday+' taken'+(totalToday && takenToday===totalToday ? ' ✓' : '')+'</span></div>';

  rows += mockDays.map(function(d){
    var label = formatWeekdayMonthDay(dateNDaysAgo(d.daysAgo));
    return '<div class="history-row"><span class="history-date">'+escapeHtml(label)+'</span>' +
      '<span class="history-frac">'+d.taken+' of '+d.total+' taken'+(d.total && d.taken===d.total ? ' ✓' : '')+'</span></div>';
  }).join('');

  document.getElementById('screen').innerHTML =
    '<h2 class="title">Daily history</h2>' +
    '<p class="lede">How consistently scheduled doses have been taken.</p>' +
    '<div class="card">'+rows+'</div>' +
    '<p class="disclaimer">Today\'s numbers are real, based on what you\'ve marked as taken in this session. The earlier days here are illustrative, since this demo doesn\'t store data between visits yet.</p>';
}

function render(){
  renderTabbar();
  if (state.view === 'home') renderHome();
  else if (state.view === 'scan') renderScan();
  else if (state.view === 'analyzing') renderAnalyzing();
  else if (state.view === 'confirm') renderConfirm();
  else if (state.view === 'settings') renderSettings();
  else if (state.view === 'checkin') renderCheckin();
  else if (state.view === 'checkin-result') renderCheckinResult();
  else if (state.view === 'healthlog') renderHealthLog();
  else if (state.view === 'history') renderHistory();
  renderOverlay();
}

applyTheme(state.theme);
</script>
</body>
