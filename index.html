<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitPill — medication reminders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EDF1F7;
    --bg-top:#F4F8FD;
    --bg-bot:#DFECF9;
    --surface:#FFFFFF;
    --primary:#1B5FA8;
    --primary-2:#3D8BDD;
    --primary-dark:#0E3F73;
    --primary-light:#DCEEFB;
    --chip-bg:#E8F2FC;
    --text:#14243A;
    --text-secondary:#4F6C87;
    --border:#D6E5F4;
    --warn-bg:#FBEFD9;
    --warn-fg:#8A5A0B;
    --good-bg:#E1F3EA;
    --good-fg:#1F6B49;
    --scale:1;
    --font-family:'Atkinson Hyperlegible', Arial, sans-serif;
    --sp-1:4px;
    --sp-2:8px;
    --sp-3:12px;
    --sp-4:16px;
    --sp-5:20px;
    --sp-6:24px;
    --sp-7:32px;
    --r-card:24px;
    --r-inner:14px;
    --accent-grad:linear-gradient(140deg, var(--primary-2), var(--primary));
    --glass:rgba(255,255,255,0.66);
    --glass-border:rgba(255,255,255,0.78);
    --shadow-sm:0 1px 2px rgba(15,35,60,0.05), 0 2px 8px rgba(15,35,60,0.05);
    --shadow-md:0 2px 4px rgba(15,35,60,0.05), 0 10px 28px -6px rgba(20,50,90,0.12);
    --shadow-lg:0 4px 10px rgba(10,30,55,0.07), 0 32px 64px -16px rgba(15,45,85,0.28);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ font-size:calc(15px * var(--scale)); }
  html[data-size="small"]{ --scale:0.9; }
  html[data-size="large"]{ --scale:1.18; }
  html[data-size="xl"]{ --scale:1.36; }
  body{
    font-family:var(--font-family);
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:var(--sp-7) var(--sp-3) var(--sp-7);
    min-height:100vh;
  }
  :focus-visible{outline:2.5px solid var(--primary); outline-offset:2px; border-radius:6px;}
  .page{display:flex; flex-direction:column; align-items:center; gap:var(--sp-4); width:100%; max-width:420px;}
  .caption{
    font-size:13px; color:var(--text-secondary); text-align:center; max-width:360px; line-height:1.5;
  }
  .phone{
    position:relative;
    width:390px;
    max-width:94vw;
    /* Re-declared so the gradient resolves against the theme vars applyTheme() sets on this element */
    --accent-grad:linear-gradient(140deg, var(--primary-2), var(--primary));
    background:linear-gradient(180deg, var(--bg-top), var(--bg-bot));
    border-radius:40px;
    border:1px solid rgba(255,255,255,0.85);
    box-shadow:var(--shadow-lg);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:760px;
  }
  .phone::before, .phone::after{
    content:''; position:absolute; border-radius:50%; pointer-events:none; z-index:0;
  }
  .phone::before{
    top:-110px; right:-90px; width:320px; height:320px;
    background:radial-gradient(circle, color-mix(in srgb, var(--primary-2) 24%, transparent) 0%, transparent 68%);
  }
  .phone::after{
    bottom:-130px; left:-110px; width:360px; height:360px;
    background:radial-gradient(circle, color-mix(in srgb, var(--primary) 16%, transparent) 0%, transparent 68%);
  }
  .statusbar{
    position:relative; z-index:2;
    background:linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.5));
    border-bottom:1px solid rgba(255,255,255,0.9);
    color:var(--text);
    padding:14px 22px 12px;
    display:flex;
    align-items:center;
    gap:var(--sp-3);
    -webkit-backdrop-filter:blur(6px);
    backdrop-filter:blur(6px);
    box-shadow:0 0 0 rgba(15,40,70,0);
    transition:background 0.2s, box-shadow 0.2s, backdrop-filter 0.2s;
  }
  .statusbar.scrolled{
    background:linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.78));
    box-shadow:0 6px 18px -8px rgba(15,40,70,0.22);
    -webkit-backdrop-filter:blur(20px) saturate(1.35);
    backdrop-filter:blur(20px) saturate(1.35);
  }
  .statusbar .logo{
    width:36px;height:36px;border-radius:12px;background:var(--accent-grad);
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.4), 0 3px 8px -2px color-mix(in srgb, var(--primary) 50%, transparent);
  }
  .statusbar h1{font-size:1.06rem; margin:0; font-weight:700; letter-spacing:0.2px; color:var(--text);}
  .statusbar .sub{font-size:0.72rem; color:var(--text-secondary); margin:0;}
  .screen{
    flex:1;
    overflow-y:auto;
    padding:var(--sp-5) var(--sp-4) 104px;
    background:transparent;
    position:relative;
    z-index:1;
  }
  .screen::-webkit-scrollbar{width:0;}
  .tabbar{
    position:absolute; left:14px; right:14px; bottom:14px; z-index:6;
    display:flex;
    align-items:stretch;
    background:var(--glass);
    -webkit-backdrop-filter:blur(24px) saturate(1.4);
    backdrop-filter:blur(24px) saturate(1.4);
    border:1px solid var(--glass-border);
    border-radius:30px;
    padding:6px 8px;
    box-shadow:0 2px 6px rgba(15,40,70,0.08), 0 16px 32px -8px rgba(15,45,85,0.22), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  @supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){
    .tabbar{ background:rgba(255,255,255,0.94); }
  }
  .tabbtn{
    flex:1;
    border:none;
    background:none;
    padding:8px 2px 7px;
    border-radius:22px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    color:var(--text-secondary);
    font-family:inherit;
    font-size:0.68rem;
    font-weight:700;
    cursor:pointer;
    transition:background 0.15s, color 0.15s;
  }
  .tabbtn.active{color:var(--primary); background:color-mix(in srgb, var(--primary) 10%, transparent);}
  .tabbtn svg{width:23px;height:23px;}
  .tab-scan{
    flex:none; align-self:center;
    width:54px; height:54px; border-radius:50%;
    margin:0 6px;
    border:none; cursor:pointer;
    background:var(--accent-grad);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 8px rgba(10,35,65,0.18), 0 10px 22px -4px color-mix(in srgb, var(--primary) 55%, transparent), inset 0 1px 0 rgba(255,255,255,0.35);
    transition:transform 0.12s, filter 0.15s;
  }
  .tab-scan:active{transform:scale(0.95); filter:brightness(0.96);}
  .tab-scan svg{width:24px;height:24px;}
  .home-eyebrow{font-size:0.7rem; font-weight:700; letter-spacing:1.4px; text-transform:uppercase; color:var(--text-secondary); margin:2px 0 4px;}
  .hero{font-size:1.6rem; font-weight:700; letter-spacing:-0.3px; margin:0 0 2px; color:var(--text);}
  h2.title{font-size:1.42rem; margin:2px 0 4px; font-weight:700; letter-spacing:-0.2px; color:var(--text);}
  p.lede{font-size:0.92rem; color:var(--text-secondary); margin:0 0 var(--sp-5); line-height:1.5;}
  .card{
    background:var(--surface);
    border:1px solid color-mix(in srgb, var(--border) 55%, #fff);
    border-radius:var(--r-card);
    padding:var(--sp-4);
    margin-bottom:var(--sp-3);
    box-shadow:var(--shadow-md);
  }
  .med-row{display:flex; align-items:flex-start; gap:var(--sp-4);}
  .pill-icon{
    width:46px;height:46px;border-radius:23px;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:1rem;
    position:relative; margin:6px;
  }
  .pill-ring{position:absolute; top:-6px; left:-6px; pointer-events:none;}
  .med-name{font-size:1.08rem; font-weight:700; margin:0 0 2px;}
  .med-brand{font-size:0.78em; font-weight:400; color:var(--text-secondary);}
  .med-meta{font-size:0.86rem; color:var(--text-secondary); margin:0;}
  .badge{
    display:inline-block; font-size:0.74rem; font-weight:700; padding:3px 10px;
    border-radius:999px; margin-top:7px;
  }
  .badge.due{background:var(--warn-bg); color:var(--warn-fg);}
  .badge.taken{background:var(--good-bg); color:var(--good-fg);}
  .badge.upcoming{background:var(--chip-bg); color:var(--primary-dark);}
  .row-actions{margin-top:var(--sp-3); display:flex; flex-wrap:wrap; gap:var(--sp-2); align-items:center;}
  .btn{
    border:none; border-radius:999px; font-family:inherit; cursor:pointer;
    font-weight:700; font-size:0.95rem; padding:var(--sp-3) var(--sp-5);
    display:inline-flex; align-items:center; justify-content:center; gap:var(--sp-2);
    transition:transform 0.12s, filter 0.15s, box-shadow 0.15s;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{
    background:var(--accent-grad); color:#fff; width:100%;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.32), 0 2px 4px rgba(10,30,60,0.1), 0 10px 20px -6px color-mix(in srgb, var(--primary) 45%, transparent);
  }
  .btn-primary:active{filter:brightness(0.95);}
  .btn-secondary{background:var(--chip-bg); color:var(--primary-dark); width:100%; border:1px solid color-mix(in srgb, var(--primary) 14%, transparent);}
  .btn-secondary:active{filter:brightness(0.97);}
  .btn-small{padding:9px 16px; font-size:0.85rem; width:auto;}
  .btn-ghost{background:none; color:var(--primary); padding:8px 4px; width:100%; text-decoration:underline;}
  .fab-wrap{
    position:sticky; bottom:86px; z-index:3;
    padding:7px; margin-top:var(--sp-2);
    background:var(--glass);
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border:1px solid var(--glass-border); border-radius:999px;
    box-shadow:var(--shadow-sm);
  }
  .field-label{font-size:0.86rem; font-weight:700; color:var(--text); display:block; margin:var(--sp-4) 0 var(--sp-2);}
  input[type="text"], input[type="password"], input[type="tel"], input[type="date"], input[type="time"], textarea{
    width:100%; border:1.5px solid var(--border); border-radius:var(--r-inner);
    padding:12px 13px; font-family:inherit; font-size:0.98rem; color:var(--text);
    background:var(--surface);
    transition:border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--primary);
    box-shadow:0 0 0 3px color-mix(in srgb, var(--primary) 16%, transparent);
  }
  textarea{resize:vertical; min-height:64px;}
  .chip-row{display:flex; flex-wrap:wrap; gap:var(--sp-2); margin-top:var(--sp-2);}
  .chip{
    border:1.5px solid var(--border); background:var(--surface); color:var(--text);
    border-radius:999px; padding:9px 15px; font-family:inherit; font-size:0.86rem;
    font-weight:700; cursor:pointer;
    transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
  }
  .chip.selected{
    background:var(--accent-grad); border-color:transparent; color:#fff;
    box-shadow:0 4px 10px -3px color-mix(in srgb, var(--primary) 45%, transparent);
  }
  .chip.removable{background:var(--chip-bg); border-color:var(--chip-bg); color:var(--primary-dark); display:flex; gap:6px; align-items:center;}
  .photo-frame{
    width:100%; aspect-ratio:4/3; border-radius:18px; background:var(--chip-bg);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    border:1.5px dashed var(--border); margin-bottom:16px;
  }
  .photo-frame img{width:100%; height:100%; object-fit:cover;}
  .notice{
    background:var(--warn-bg); color:var(--warn-fg); border-radius:var(--r-inner); padding:11px 13px;
    font-size:0.84rem; margin-bottom:14px; line-height:1.4;
  }
  .spin{
    width:42px;height:42px;border-radius:50%;border:4px solid var(--chip-bg);
    border-top-color:var(--primary); animation:sp 0.9s linear infinite; margin:0 auto 18px;
  }
  @keyframes sp{to{transform:rotate(360deg);}}
  .center-pad{padding:var(--sp-7) var(--sp-3); text-align:center;}
  .settings-section{margin-bottom:var(--sp-6);}
  .settings-section h3{font-size:0.95rem; margin:0 0 var(--sp-3);}
  .size-row{display:flex; flex-wrap:wrap; gap:var(--sp-2);}
  .toggle-row{display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) 0; border-bottom:1px solid var(--border);}
  .toggle-row:last-child{border-bottom:none;}
  .switch{width:46px; height:28px; border-radius:14px; background:var(--border); position:relative; cursor:pointer; flex:none; transition:background 0.15s;}
  .switch.on{background:var(--accent-grad);}
  .switch .knob{position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:left 0.15s; box-shadow:0 1px 3px rgba(10,30,60,0.25);}
  .switch.on .knob{left:21px;}
  .disclaimer{font-size:0.76rem; color:var(--text-secondary); line-height:1.5; margin-top:6px;}
  .chat-area{display:flex; flex-direction:column; gap:var(--sp-2); margin-bottom:var(--sp-4);}
  .bubble-row{display:flex;}
  .bubble-row.user{justify-content:flex-end;}
  .bubble{
    max-width:80%; padding:var(--sp-2) var(--sp-4); border-radius:18px; font-size:0.94rem; line-height:1.45;
    box-shadow:var(--shadow-sm);
  }
  .bubble.assistant{background:var(--surface); border:1px solid color-mix(in srgb, var(--border) 55%, #fff); border-bottom-left-radius:6px;}
  .bubble.user{background:var(--accent-grad); color:#fff; border-bottom-right-radius:6px; box-shadow:none;}
  .chat-input-row{
    display:flex; gap:var(--sp-2); align-items:flex-end; position:sticky; bottom:86px; z-index:3;
    background:var(--glass);
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border:1px solid var(--glass-border); border-radius:22px;
    padding:8px; box-shadow:var(--shadow-sm);
  }
  .chat-input-row textarea{flex:1; min-height:46px; max-height:90px;}
  .mic-btn{
    flex:none; width:46px; height:46px; border-radius:23px; border:none; cursor:pointer;
    background:var(--chip-bg); color:var(--primary-dark); display:flex; align-items:center; justify-content:center;
  }
  .mic-btn.listening{background:#E24B4A; color:#fff;}
  .send-btn{flex:none; width:46px; height:46px; border-radius:23px; border:none; cursor:pointer; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center;}
  .severity-tag{font-size:0.78rem; font-weight:700; padding:3px 10px; border-radius:20px; display:inline-block; margin-top:6px;}
  .severity-none, .severity-mild{background:var(--good-bg); color:var(--good-fg);}
  .severity-moderate, .severity-severe{background:var(--warn-bg); color:var(--warn-fg);}
  select{
    width:100%; border:1.5px solid var(--border); border-radius:var(--r-inner);
    padding:12px 13px; font-family:inherit; font-size:0.98rem; color:var(--text); background:var(--surface);
  }
  .source-tag{font-size:0.72rem; color:var(--text-secondary); margin-top:2px;}
  .doctor-entry{border-bottom:1px solid var(--border); padding:14px 0;}
  .doctor-entry:last-child{border-bottom:none;}
  .doctor-entry .d-date{font-size:0.8rem; color:var(--text-secondary); font-weight:700; margin:0 0 4px;}

  /* Camera viewfinder */
  .camera-wrap{
    position:absolute; inset:0; background:#0b0b0c; z-index:5;
    display:flex; flex-direction:column;
  }
  .camera-wrap video, .camera-wrap .cam-placeholder{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .cam-placeholder{
    background:linear-gradient(160deg,#1c1c1e,#3a3a3c);
    display:flex; align-items:center; justify-content:center;
  }
  .cam-overlay{position:absolute; inset:0; display:flex; flex-direction:column;}
  .cam-close{
    position:absolute; top:18px; right:18px; width:34px; height:34px; border-radius:17px;
    background:rgba(255,255,255,0.18); color:#fff; border:none; font-size:1.1rem; cursor:pointer; z-index:2;
  }
  .cam-caption{
    align-self:center; margin-top:54px; background:rgba(20,20,22,0.7); color:#fff;
    font-size:0.84rem; font-weight:700; padding:9px 16px; border-radius:20px; z-index:2;
  }
  .cam-frame{
    flex:1; margin:18px 36px; border:3px solid rgba(255,255,255,0.85); border-radius:18px;
    display:flex; align-items:flex-start; justify-content:center; z-index:1;
  }
  .cam-controls{
    display:flex; justify-content:center; align-items:center; padding:26px 0 30px; z-index:2;
  }
  .shutter-btn{
    width:70px; height:70px; border-radius:35px; background:#fff; border:5px solid rgba(255,255,255,0.4);
    cursor:pointer;
  }
  .cam-fallback-card{
    position:relative; z-index:2; margin:auto 24px; background:rgba(255,255,255,0.96); border-radius:18px;
    padding:20px; text-align:center;
  }

  /* Alarm-style reminder */
  .alarm-overlay{
    position:absolute; inset:0; z-index:10; color:#fff;
    background:
      radial-gradient(120% 90% at 85% -10%, color-mix(in srgb, var(--primary-2) 55%, transparent), transparent 55%),
      radial-gradient(100% 80% at -10% 110%, color-mix(in srgb, var(--primary) 45%, transparent), transparent 60%),
      linear-gradient(165deg, var(--primary-dark) 0%, #0A1626 95%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:26px;
  }
  .alarm-status{font-size:0.74rem; opacity:0.85; margin-bottom:16px; text-align:center;}
  .alarm-card{
    width:100%;
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.24);
    border-radius:28px;
    padding:26px 22px 20px;
    text-align:center;
    -webkit-backdrop-filter:blur(20px) saturate(1.3);
    backdrop-filter:blur(20px) saturate(1.3);
    box-shadow:0 24px 48px -12px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.28);
  }
  .alarm-pill{
    width:60px; height:60px; border-radius:30px; margin:0 auto 14px;
    background:rgba(255,255,255,0.14); border:1px solid rgba(255,255,255,0.26);
    display:flex; align-items:center; justify-content:center;
  }
  .alarm-time{font-size:2.7rem; font-weight:700; letter-spacing:0.5px; margin:0 0 2px;}
  .alarm-name{font-size:1.25rem; font-weight:700; margin:0 0 4px; text-align:center;}
  .alarm-meta{font-size:0.95rem; opacity:0.85; margin:0 0 24px; text-align:center;}
  .alarm-take{
    width:100%; background:#fff; color:var(--primary-dark); border:none; border-radius:999px;
    padding:16px; font-family:inherit; font-weight:700; font-size:1.02rem; cursor:pointer; margin-bottom:10px;
    box-shadow:0 6px 16px -4px rgba(0,0,0,0.35);
    transition:transform 0.12s, filter 0.15s;
  }
  .alarm-take:active{transform:translateY(1px); filter:brightness(0.95);}
  .alarm-delay{
    width:100%; background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.28); border-radius:999px;
    padding:15px; font-family:inherit; font-weight:700; font-size:1.02rem; cursor:pointer;
    transition:transform 0.12s, background 0.15s;
  }
  .alarm-delay:active{transform:translateY(1px); background:rgba(255,255,255,0.22);}

  /* Theme swatches */
  .swatch-row{display:flex; gap:14px; margin-top:6px;}
  .swatch{
    width:42px; height:42px; border-radius:21px; cursor:pointer; border:3px solid transparent;
    display:flex; align-items:center; justify-content:center;
    box-shadow:inset 0 2px 4px rgba(255,255,255,0.35), 0 3px 8px -2px rgba(15,40,70,0.3);
    transition:transform 0.12s;
  }
  .swatch:active{transform:scale(0.94);}
  .swatch.active{border-color:var(--text);}

  /* Font picker */
  .font-option{
    display:flex; align-items:center; justify-content:space-between; width:100%;
    border:1.5px solid var(--border); border-radius:16px; padding:var(--sp-3) var(--sp-4);
    margin-bottom:var(--sp-2); background:var(--surface); cursor:pointer; text-align:left;
    transition:border-color 0.15s, background 0.15s;
  }
  .font-option.selected{border-color:var(--primary); background:var(--primary-light);}
  .font-option-name{font-size:1.02rem; font-weight:700; margin:0;}
  .font-option-note{font-size:0.78rem; color:var(--text-secondary); margin:2px 0 0;}
  .font-option-check{flex:none; margin-left:var(--sp-3); color:var(--primary);}
  .notif-status{
    font-size:0.82rem; padding:10px 12px; border-radius:var(--r-inner); margin-bottom:10px; line-height:1.4;
  }
  .notif-status.granted{background:var(--good-bg); color:var(--good-fg);}
  .notif-status.pending{background:var(--chip-bg); color:var(--primary-dark);}
  .notif-status.blocked{background:var(--warn-bg); color:var(--warn-fg);}

  .history-date{font-size:0.95rem; font-weight:700;}
  .history-frac{font-size:0.85rem; color:var(--text-secondary);}

  /* Pill meter */

  .expiry-note{font-size:0.78rem; color:#8A3C1E; background:#FBEFD9; border-radius:var(--r-inner); padding:8px 10px; margin-top:9px; line-height:1.4;}
  .expiry-line{font-size:0.78rem; color:var(--text-secondary); margin:4px 0 0;}
  .dispenser-log{background:#0F1B24; border-radius:var(--r-inner); padding:10px 12px; margin-top:6px; max-height:200px; overflow-y:auto;}
  .dispenser-log-row{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:0.76rem; color:#B9E4D0; padding:3px 0; line-height:1.4; border-bottom:1px solid rgba(255,255,255,0.06);}
  .dispenser-log-row:last-child{border-bottom:none;}
  .dispenser-log-time{color:#7C93A6;}

  /* Medication info (description / category / conditions) */
  .med-info-toggle{margin-top:6px; font-size:0.82rem; text-decoration:underline; color:var(--primary); background:none; border:none; cursor:pointer; padding:4px 0; font-family:inherit; font-weight:700;}
  .med-info-body{background:var(--chip-bg); border-radius:var(--r-inner); padding:10px 12px; margin-top:4px;}
  .med-info-category{display:inline-block; font-size:0.74rem; font-weight:700; color:var(--primary-dark); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3px 10px; margin:0 0 7px;}
  .med-info-desc{font-size:0.85rem; color:var(--text); margin:0 0 7px; line-height:1.45;}
  .med-info-conditions{font-size:0.82rem; color:var(--text-secondary); margin:7px 0 0; line-height:1.45;}
  .med-info-recommend{font-size:0.82rem; color:var(--text-secondary); margin:9px 0 0; line-height:1.45;}
  .med-info-recommend-list{font-size:0.82rem; color:var(--text-secondary); margin:2px 0 0; padding-left:20px; line-height:1.5;}

  /* Always-visible medication warnings banner */
  .med-warning-banner{background:var(--warn-bg); border:1px solid #EED9A6; border-radius:var(--r-inner); padding:10px 12px; margin-top:var(--sp-2);}
  .med-warning-head{display:flex; align-items:center; gap:6px; color:var(--warn-fg); font-weight:700; font-size:0.86rem;}
  .med-warning-head svg{flex:none;}
  .med-warning-list{margin:4px 0 0; padding-left:24px; color:var(--warn-fg); font-size:0.82rem; line-height:1.5;}

  /* Welcome / first-run onboarding */
  .welcome{
    position:absolute; inset:0; z-index:12;

  .welcome::before{
    content:''; position:absolute; top:-120px; right:-80px; width:300px; height:300px;
    border-radius:50%; pointer-events:none;
    background:radial-gradient(circle, color-mix(in srgb, var(--primary-2) 30%, transparent) 0%, transparent 68%);

  .welcome-inner{position:relative; z-index:1; display:flex; flex-direction:column; min-height:100%;}
  .welcome-dots{display:flex; gap:7px; justify-content:center; margin-bottom:22px;}

  .welcome-dot.active{width:22px; border-radius:5px; background:var(--accent-grad);}
  .welcome-mark{
    width:76px; height:76px; border-radius:24px; margin:8px auto 20px;

    box-shadow:inset 0 1px 0 rgba(255,255,255,0.4), 0 12px 26px -6px color-mix(in srgb, var(--primary) 55%, transparent);
  }
  .welcome-hero{position:relative; width:100%; max-width:300px; height:184px; margin:2px auto 16px;}
  .welcome-medallion{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; z-index:2;}
  .welcome-medallion svg{width:150px; height:150px; filter:drop-shadow(0 16px 26px color-mix(in srgb, var(--primary) 26%, transparent));}
  .welcome-float{position:absolute; z-index:1; display:flex; filter:drop-shadow(0 6px 10px rgba(20,50,90,0.12));}
  .welcome-float.f1{top:20px; left:24px;}
  .welcome-float.f2{bottom:22px; right:26px;}
  .welcome-title{font-size:1.7rem; font-weight:700; letter-spacing:-0.4px; text-align:center; margin:0 0 8px; color:var(--text);}
  .welcome-sub{font-size:0.98rem; color:var(--text-secondary); text-align:center; line-height:1.55; margin:0 auto 24px; max-width:300px;}
  .welcome-step-title{font-size:1.4rem; font-weight:700; letter-spacing:-0.2px; margin:4px 0 4px; color:var(--text);}
  .welcome-step-sub{font-size:0.92rem; color:var(--text-secondary); line-height:1.5; margin:0 0 16px;}
  .welcome-features{
    background:var(--surface); border:1px solid color-mix(in srgb, var(--border) 55%, #fff);
    border-radius:var(--r-card); padding:4px 16px; margin-bottom:8px; box-shadow:var(--shadow-md);
  }
  .welcome-feature{display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border);}
  .welcome-feature:last-child{border-bottom:none;}

    background:var(--primary-light); color:var(--primary-dark);

  .welcome-spacer{flex:1; min-height:20px;}
  .welcome-actions{display:flex; flex-direction:column; gap:8px; margin-top:20px;}
  .welcome-nav{display:flex; gap:10px; margin-top:20px;}
  .welcome-nav .btn{flex:1;}
  .btn-back{background:var(--chip-bg); color:var(--text-secondary); border:1px solid var(--border);}

  /* Motion — every non-essential animation lives inside this block so users
     who ask the OS for reduced motion get an instant, static UI instead. */
  @media (prefers-reduced-motion: no-preference){
    @keyframes rise-in{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
    @keyframes scale-in{from{opacity:0; transform:scale(0.88);} to{opacity:1; transform:none;}}
    @keyframes fade-in{from{opacity:0;} to{opacity:1;}}
    @keyframes slide-in-right{from{opacity:0; transform:translateX(26px);} to{opacity:1; transform:none;}}
    @keyframes slide-in-left{from{opacity:0; transform:translateX(-26px);} to{opacity:1; transform:none;}}
    @keyframes glow-drift{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-14px,12px) scale(1.1);}}
    @keyframes ring-fill{from{stroke-dashoffset:var(--ring-circ);}}
    @keyframes pulse-good{from{box-shadow:0 0 0 0 rgba(31,107,73,0.35);} to{box-shadow:0 0 0 16px rgba(31,107,73,0);}}

    /* Screen content cascades in on view change only (render() gates the class) */
    .view-enter > *{animation:rise-in 0.34s ease-out backwards;}
    .view-enter > *:nth-child(2){animation-delay:0.04s;}
    .view-enter > *:nth-child(3){animation-delay:0.08s;}
    .view-enter > *:nth-child(4){animation-delay:0.12s;}
    .view-enter > *:nth-child(5){animation-delay:0.16s;}
    .view-enter > *:nth-child(6){animation-delay:0.2s;}
    .view-enter > *:nth-child(7){animation-delay:0.24s;}
    .view-enter > *:nth-child(n+8){animation-delay:0.28s;}
    .view-enter > .camera-wrap{animation:fade-in 0.3s ease-out;}

    /* Pill supply ring draws up to its level on view entry */
    .view-enter .pill-ring circle:nth-child(2){animation:ring-fill 0.7s ease-out 0.25s backwards;}

    /* Reminder alarm: backdrop fades, glass card settles in */
    .alarm-overlay{animation:fade-in 0.22s ease-out;}
    .alarm-overlay .alarm-card{animation:scale-in 0.3s ease-out 0.06s backwards;}

    /* Mark-as-taken acknowledgement */
    .card.just-taken .pill-icon{animation:pulse-good 0.6s ease-out;}
    .card.just-taken .badge.taken{animation:scale-in 0.25s ease-out;}

    /* Welcome: ambient glow drift + floating hero shapes + first-show cascade + directional steps */
    @keyframes float-a{0%,100%{transform:translate(0,0) rotate(0deg);} 50%{transform:translate(0,-11px) rotate(7deg);}}
    @keyframes float-b{0%,100%{transform:translate(0,0) rotate(0deg);} 50%{transform:translate(6px,9px) rotate(-6deg);}}
    @keyframes bob{0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);}}
    .welcome::before{animation:glow-drift 9s ease-in-out infinite;}
    .welcome-medallion{animation:bob 5.5s ease-in-out infinite;}
    .welcome-float.f1{animation:float-a 5.6s ease-in-out infinite;}
    .welcome-float.f2{animation:float-b 6.8s ease-in-out infinite;}
    .welcome.w-cascade .welcome-dots{animation:fade-in 0.4s ease-out;}
    .welcome.w-cascade .welcome-mark,
    .welcome.w-cascade .welcome-hero{animation:scale-in 0.45s ease-out backwards;}
    .welcome.w-cascade .welcome-title{animation:rise-in 0.35s ease-out 0.1s backwards;}
    .welcome.w-cascade .welcome-sub{animation:rise-in 0.35s ease-out 0.18s backwards;}
    .welcome.w-cascade .welcome-features{animation:rise-in 0.35s ease-out 0.26s backwards;}
    .welcome.w-cascade .welcome-feature:nth-child(1){animation:rise-in 0.35s ease-out 0.32s backwards;}
    .welcome.w-cascade .welcome-feature:nth-child(2){animation:rise-in 0.35s ease-out 0.4s backwards;}
    .welcome.w-cascade .welcome-feature:nth-child(3){animation:rise-in 0.35s ease-out 0.48s backwards;}
    .welcome.w-cascade .welcome-actions{animation:rise-in 0.35s ease-out 0.58s backwards;}
    .welcome.w-fwd .welcome-inner{animation:slide-in-right 0.28s ease-out;}
    .welcome.w-back .welcome-inner{animation:slide-in-left 0.28s ease-out;}
  }
</style>

function geminiHeaders(){

  };

function geminiText(data){
  var cand = (data.candidates || [])[0];
  var parts = (cand && cand.content && cand.content.parts) || [];
  return parts.map(function(p){ return p.text || ''; }).join('');
}

function saveApiKey(){

  state.caregiverSmsLastResult = null;

function sendCaregiverSms(message){
  if (!state.caregiverSmsUrl || !state.emergencyContactPhone) return Promise.resolve(false);
  var body = new URLSearchParams();
  body.set('to', state.emergencyContactPhone);
  body.set('body', message);
  return fetch(state.caregiverSmsUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body.toString()
  }).then(function(res){ return res.ok; }).catch(function(){ return false; });
}

  if (!state.emergencyContactPhone){

  state.caregiverSmsLastResult = null;

    PERSONAL_INFO_FIELDS.forEach(function(key){ result[key] = ''; });

  d.log.push({ time: new Date().toLocaleTimeString(), text: line });
  if (d.log.length > 12) d.log.shift();
  console.log('[dispenser]', line);
  render();
}

async function readDispenserLoop(reader){
  var buffer = '';
  try {
    while (true){
      var result = await reader.read();
      if (result.done) break;
      buffer += result.value;
      var lines = buffer.split('\n');
      buffer = lines.pop();
      lines.forEach(function(line){
        line = line.trim();
        if (line) logDispenserActivity('Received: ' + line);
      });
    }
  } catch (err){
    // Port was likely closed — nothing to do here.
  }
}

async function connectDispenser(){
  var d = state.dispenser;
  if (!d.supported){
    logDispenserActivity('This browser does not support Web Serial (navigator.serial is missing).');
    return;
  }
  if (window.isSecureContext === false){
    logDispenserActivity('Blocked: this page is not running in a secure context. Open the saved .html file directly rather than through a preview.');
    return;
  }
  if (window.self !== window.top){
    logDispenserActivity('Blocked: this page appears to be inside an iframe/preview. Download the file and open it in its own browser tab.');
    return;
  }
  if (d.connecting || d.connected) return;
  d.connecting = true;
  render();
  try {
    var port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });
    var encoder = new TextEncoderStream();
    encoder.readable.pipeTo(port.writable);
    var decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    d.port = port;
    d.writer = encoder.writable.getWriter();
    d.reader = decoder.readable.getReader();
    d.connected = true;
    d.connecting = false;
    var info = (port.getInfo && port.getInfo()) || {};
    d.label = info.usbProductId ? ('USB device ' + info.usbProductId) : 'Connected device';
    d.log = [];
    logDispenserActivity('Connected' + (d.label ? (' — ' + d.label) : '') + '.');
    readDispenserLoop(d.reader);
  } catch (err){
    d.connecting = false;
    if (err && err.name === 'NotFoundError'){
      logDispenserActivity('No port was selected. If the device list was empty, check the Arduino is plugged in and its drivers are installed.');
    } else {
      logDispenserActivity('Connection failed: ' + (err && (err.message || err.name) || err));
    }
  }
  render();
}

async function disconnectDispenser(){
  var d = state.dispenser;
  try {
    if (d.reader){
      await d.reader.cancel();
    }
    if (d.writer){
      await d.writer.close();
    }
    if (d.port){
      await d.port.close();
    }
  } catch (err){
    // Ignore close errors — we're tearing the connection down anyway.
  }
  d.port = null;
  d.writer = null;
  d.reader = null;
  d.connected = false;
  d.label = null;
  logDispenserActivity('Disconnected.');
}

async function sendServoCommand(boxId, action){
  var d = state.dispenser;
  if (!d.connected || !d.writer){
    logDispenserActivity('Ignored ' + action + ':' + boxId + ' — dispenser is not connected.');
    alert('The dispenser isn\'t connected yet. Go to Settings to connect it.');
    return false;
  }
  var command = action + ':' + boxId;
  try {
    await d.writer.write(command + '\n');
    logDispenserActivity('Sent: ' + command);
    return true;
  } catch (err){
    logDispenserActivity('Error sending ' + command + ': ' + (err.message || err));
    alert('Could not reach the dispenser: ' + (err.message || err));
    return false;
  }
}

async function openBox(medId){
  var med = state.meds.filter(function(m){ return m.id === medId; })[0];

  state.dispenser.lastAction = 'Opening box ' + med.boxId + ' for ' + med.name + '…';
  render();
  var ok = await sendServoCommand(med.boxId, 'OPEN');
  if (ok){
    state.dispenser.openBoxes[med.boxId] = true;
    state.dispenser.lastAction = 'Box ' + med.boxId + ' is open — it will close once marked as taken.';
  } else {

  render();
}

async function closeBox(medId){

  if (!med || !med.boxId) return;
  var ok = await sendServoCommand(med.boxId, 'CLOSE');
  if (ok){

    state.dispenser.lastAction = 'Box ' + med.boxId + ' closed.';

}

async function closeBoxIfOpen(boxId){

function todayKey(){
  var d = new Date();
  return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
}
function dateNDaysAgo(n){
  var d = new Date();
  d.setDate(d.getDate() - n);
  return d;
}
function formatMonthDay(date){
  return date.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function formatWeekdayMonthDay(date){
  return date.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}
function todayDateLabel(){
  return 'Today · ' + formatMonthDay(new Date());
}
function nowHHMM(){
  var d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function formatTime(hhmm){
  var parts = hhmm.split(':');
  var h = parseInt(parts[0], 10);
  var m = parts[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  var h12 = h % 12; if (h12 === 0) h12 = 12;
  return h12 + ':' + m + ' ' + ampm;
}
function greeting(){
  var h = new Date().getHours();
  var base = h < 12 ? 'Good morning' : (h < 17 ? 'Good afternoon' : 'Good evening');

function iconPill(size, color){
  // Two-tone capsule: solid-filled left half + outlined right half with a
  // center seam. Monochrome so it reads on any background it's placed on.
  return '<svg viewBox="0 0 24 24" width="'+size+'" height="'+size+'" fill="none" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="2.5" y="7" width="19" height="10" rx="5" fill="none" stroke="'+color+'" stroke-width="2"/>' +
    '<path d="M12 7 H7.5 A5 5 0 0 0 7.5 17 H12 Z" fill="'+color+'"/>' +
    '<line x1="12" y1="7" x2="12" y2="17" stroke="'+color+'" stroke-width="2"/>' +
  '</svg>';
}

function pillFraction(med){
  var total = med.pillsTotal || 0;
  if (total <= 0) return null;
  var remaining = (typeof med.pillsRemaining === 'number') ? med.pillsRemaining : total;
  if (remaining < 0) remaining = 0;
  var pct = Math.max(0, Math.min(100, Math.round((remaining / total) * 100)));
  var low = !isExpired(med) && (remaining <= 5 || remaining <= Math.ceil(total * 0.2));
  return { total: total, remaining: remaining, pct: pct, low: low };
}

function medIconHtml(med){
  var c = MED_COLORS[med.color % MED_COLORS.length];
  var expired = isExpired(med);
  var fg = expired ? '#8A97A6' : c.fg;
  var bg = expired ? '#EDEFF2' : c.bg;
  var ring = '';
  var frac = pillFraction(med);
  if (frac){
    var r = 26, circ = 2 * Math.PI * r;
    var ringColor = expired ? '#B7C0CA' : (frac.low ? '#D9534F' : fg);
    ring = '<svg class="pill-ring" viewBox="0 0 58 58" width="58" height="58" aria-hidden="true">' +
      '<circle cx="29" cy="29" r="'+r+'" fill="none" stroke="rgba(20,40,60,0.1)" stroke-width="3.5"/>' +
      '<circle cx="29" cy="29" r="'+r+'" fill="none" stroke="'+ringColor+'" stroke-width="3.5" stroke-linecap="round"' +
        ' stroke-dasharray="'+circ.toFixed(2)+'" stroke-dashoffset="'+(circ * (1 - frac.pct / 100)).toFixed(2)+'"' +
        ' style="--ring-circ:'+circ.toFixed(2)+'" transform="rotate(-90 29 29)"/>' +
    '</svg>';
  }
  return '<div class="pill-icon" style="background:'+bg+';color:'+fg+';">'+iconPill(22, fg)+ring+'</div>';
}

function isExpired(med){
  if (!med.expiryDate) return false;
  var today = new Date();
  today.setHours(0,0,0,0);
  var exp = new Date(med.expiryDate + 'T00:00:00');
  return exp < today;
}

function expiryLabel(dateStr){
  if (!dateStr) return '';
  var d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function pillMeterHtml(med){
  var frac = pillFraction(med);
  if (!frac) return '';
  var dailyUsage = (med.type === 'prn') ? null : (med.times && med.times.length ? med.times.length : 1);
  var daysLeft = (dailyUsage && dailyUsage > 0) ? Math.floor(frac.remaining / dailyUsage) : null;

  var label = frac.remaining + ' of ' + frac.total + ' pills left';
  if (daysLeft !== null){
    label += ' · about ' + daysLeft + (daysLeft === 1 ? ' day' : ' days') + ' left';
  }
  var lowBadge = frac.low ? '<span class="badge refill" style="margin-top:0;">Refill soon</span>' : '';
  return '<p class="pill-meter-label">'+label+lowBadge+'</p>';
}

function buildReminderList(){

    });
  });
  entries.sort(function(a,b){ return a.time.localeCompare(b.time); });
  return entries;

      '</div></div>';
    }).join('');
    return '<h3 class="time-header">'+formatTime(t)+'</h3>' + groupRows;
  }).join('');

  if (entries.length === 0){
    rows = '<div class="card center-pad"><p class="lede" style="margin:0;">No scheduled medications yet. Tap the camera button below to scan one.</p></div>';
  }

  var doneToday = !!state.checkinLog[today];

      '</div></div></div>';

  var prnMeds = state.meds.filter(function(m){ return m.type === 'prn'; });
  var prnHtml = '';

    prnHtml += '<h3 style="font-size:0.95rem; margin:18px 0 8px; color:var(--text-secondary);">As-needed medications</h3>';

      var statusText = doses.length
        ? (doses.length + ' of ' + med.prnMax + ' doses today · last at ' + lastDose)
        : ('0 of ' + med.prnMax + ' doses today');
      var expired = isExpired(med);
      var actionOrNote = expired
        ? '<p class="expiry-note">This medication expired '+escapeHtml(expiryLabel(med.expiryDate))+'. Please don\'t take it — check with your pharmacist about disposal and a refill.</p>'
        : '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="logPrnDose('+med.id+')">Log a dose now</button>' +

      return '<div class="card'+(expired?' expired-card':'')+(justTaken?' just-taken':'')+'"><div class="med-row">' +
        medIconHtml(med) +
        '<div style="flex:1;">' +

          '<p class="med-meta">'+escapeHtml(med.dosage)+' · '+escapeHtml(med.instructions)+'</p>' +
          '<p class="med-meta" style="margin-top:4px;">'+(expired ? 'Expired' : statusText)+'</p>' +
          pillMeterHtml(med) +
          (med.expiryDate ? '<p class="expiry-line">Expires '+escapeHtml(expiryLabel(med.expiryDate))+'</p>' : '') +
          actionOrNote +
          medWarningsHtml(med) +
          medInfoHtml(med) +

    }).join('');
  }

  document.getElementById('screen').innerHTML =
    '<p class="home-eyebrow">'+escapeHtml(new Date().toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' }))+'</p>' +
    '<h2 class="hero">'+greeting()+'</h2>' +

var mediaStream = null;
function startCamera(){
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    state.cameraSupported = false;
    renderScan();
    return;
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(function(stream){
    mediaStream = stream;
    state.cameraSupported = true;
    if (state.view === 'scan') renderScan();
    else stopCamera();
  }).catch(function(){
    state.cameraSupported = false;
    if (state.view === 'scan') renderScan();
  });
}
function stopCamera(){
  if (mediaStream){
    mediaStream.getTracks().forEach(function(t){ t.stop(); });
    mediaStream = null;
  }
}
function captureFromVideo(){
  var v = document.getElementById('cameraPreview');
  if (!v) return;
  var canvas = document.createElement('canvas');
  canvas.width = v.videoWidth || 480;
  canvas.height = v.videoHeight || 640;
  var ctx = canvas.getContext('2d');
  ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
  var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  stopCamera();
  state.photoDataUrl = dataUrl;
  state.photoMime = 'image/jpeg';
  state.view = 'analyzing';
  render();
  analyzePhoto(dataUrl, 'image/jpeg');
}

    return '<div class="notif-status granted" style="margin-top:8px;">No known allergy conflict found. '+escapeHtml(ac.explanation || '')+'</div>';

  return '<div class="med-warning-banner" style="margin-top:8px;">' +

function fireNotification(title, body, onClickCallback){
  if (!('Notification' in window)) return false;
  if (Notification.permission !== 'granted') return false;
  try {
    var n = new Notification(title, { body: body });
    n.onclick = function(){
      try { window.focus(); } catch(e){}
      onClickCallback();
      n.close();
    };
    return true;
  } catch(e){
    return false;
  }
}

    render();
  });
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, function(c){
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}

function markTaken(medId, time){

  state.takenLog[key] = nowHHMM();
  var med = state.meds.filter(function(m){ return m.id === medId; })[0];
  if (med && typeof med.pillsRemaining === 'number' && !isExpired(med)){
    med.pillsRemaining = Math.max(0, med.pillsRemaining - 1);
  }
  pulseJustTaken(key);
  render();
  if (med) closeBoxIfOpen(med.boxId);
}

function sendTestReminder(){
  var med = state.meds.filter(function(m){ return m.type !== 'prn'; })[0];
  if (!med) return;
  var time = med.times[0];
  var sent = fireNotification('GitPill', med.name + ' ' + med.dosage + ' is due now.', function(){
    state.activeAlert = { med: med, time: time, real: true };
    render();
  });
  if (!sent){
    state.activeAlert = { med: med, time: time, real: false };
    render();
  }
  if (state.autoOpenDispenser && state.dispenser.connected && med.boxId){
    openBox(med.id);
  }

function resolveAlert(taken){
  var a = state.activeAlert;
  if (taken){
    markTaken(a.med.id, a.time);
  }
  state.activeAlert = null;
  render();
}

function checkReminders(){
  if (state.activeAlert) return;
  var now = nowHHMM();
  var today = todayKey();
  for (var i = 0; i < state.meds.length; i++){
    var med = state.meds[i];
    for (var j = 0; j < med.times.length; j++){
      var t = med.times[j];
      var fireKey = med.id + '_' + t + '_' + today;
      var takenKey = fireKey;
      if (t === now && !state.firedKeys[fireKey] && !state.takenLog[takenKey]){
        state.firedKeys[fireKey] = true;
        (function(med, t){
          var sent = fireNotification('GitPill', med.name + ' ' + med.dosage + ' is due now.', function(){
            state.activeAlert = { med: med, time: t, real: true };
            render();
          });
          if (!sent){
            state.activeAlert = { med: med, time: t, real: false };
            render();
          }
          if (state.autoOpenDispenser && state.dispenser.connected && med.boxId){
            openBox(med.id);
          }
        })(med, t);
        return;
      }
    }
  }
}
setInterval(checkReminders, 15000);

var MISSED_DOSE_GRACE_MINUTES = 30;

function minutesSinceDue(hhmm){
  var parts = hhmm.split(':');
  var due = new Date();
  due.setHours(parseInt(parts[0], 10), parseInt(parts[1], 10), 0, 0);
  return (Date.now() - due.getTime()) / 60000;
}

function checkMissedDoseEscalation(){
  if (!state.caregiverAlerts || !state.caregiverSmsUrl || !state.emergencyContactPhone) return;
  var today = todayKey();
  state.meds.forEach(function(med){
    if (med.type === 'prn') return;
    med.times.forEach(function(t){
      var key = med.id + '_' + t + '_' + today;
      if (state.takenLog[key] || state.escalatedKeys[key]) return;
      if (minutesSinceDue(t) < MISSED_DOSE_GRACE_MINUTES) return;
      state.escalatedKeys[key] = true;
      sendCaregiverSms(
        (state.userName || 'Your family member') + ' has not marked ' + med.name + ' ' + med.dosage +
        ' as taken (due at ' + formatTime(t) + ').'
      );
    });
  });
}
setInterval(checkMissedDoseEscalation, 30000);

function analyzePhoto(dataUrl, mime){
  if (!state.apiKey){
    state.scanError = 'nokey';
    state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    state.view = 'confirm';
    render();
    return Promise.resolve();
  }
  var base64 = dataUrl.split(',')[1];
  var prompt = 'You are looking at a photo of a medication bottle, box, or blister pack. ' +
    'Identify the medication name, the strength or dosage printed on the label, and the dosing ' +
    'instructions (such as how many times a day and any timing notes). Also identify general reference ' +
    'information about this medication: well-known consumer brand names it is sold under (so a layperson ' +
    'can recognize it — for example if the label shows the generic name "Acetaminophen", list brand names ' +
    'like "Tylenol", "Panadol"; if the label already shows a brand name, this can be empty), its drug ' +
    'category/class, a short plain-language description of what it does, the conditions it is commonly used ' +
    'to treat, general recommendations for taking it safely (such as taking it with water or food, or timing ' +
    'around other medications), and important warnings (such as interactions with alcohol, pregnancy/' +
    'breastfeeding precautions, or things not to combine it with). ' +
    'Respond with ONLY a JSON object and nothing else, no markdown fences, in exactly this shape: ' +
    '{"name":"...","dosage":"...","instructions":"...","suggestedTimes":["08:00","20:00"],' +
    '"brandNames":["...","..."],"category":"...","description":"...","conditions":["...","..."],' +
    '"recommendations":["...","..."],"warnings":["...","..."]}. ' +
    'suggestedTimes should be 24-hour HH:MM strings reflecting how many times a day the label says to take it, ' +
    'spaced sensibly through waking hours. brandNames should be a short list (0-3 items) of common brand names, ' +
    'omitting any that are identical to the printed name. category should be a short drug class label (e.g. ' +
    '"ACE inhibitor"). description should be 1-2 plain-language sentences. conditions should be a short list ' +
    '(1-4 items) of conditions or symptoms it is commonly used to treat. recommendations should be a short list ' +
    '(1-3 items) of practical tips for taking it. warnings should be a short list (1-4 items) of important ' +
    'safety warnings, including alcohol and pregnancy/breastfeeding precautions when relevant. If a field is not ' +
    'clearly legible, make your best reasonable guess; if you cannot identify the medication at all, leave these ' +
    'fields empty.';

  return fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: geminiHeaders(),
    body: JSON.stringify({
      contents: [{
        role: 'user',
        parts: [
          { inline_data: { mime_type: mime, data: base64 } },
          { text: prompt }
        ]
      }],
      generationConfig: { maxOutputTokens: 1000, thinkingConfig: { thinkingBudget: 0 }, responseMimeType: 'application/json' }
    })
  }).then(function(res){
    if (!res.ok){
      return res.json().catch(function(){ return null; }).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      });
    }
    return res.json();
  }).then(function(data){
    var raw = geminiText(data);
    var cleaned = raw.replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (err) { parsed = null; }
    if (!parsed || !parsed.name){
      state.scanError = true;
      state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    } else {
      state.scanError = false;
      state.extracted = {
        name: parsed.name || '',
        dosage: parsed.dosage || '',
        instructions: parsed.instructions || '',
        selectedTimes: Array.isArray(parsed.suggestedTimes) && parsed.suggestedTimes.length ? parsed.suggestedTimes : ['08:00'],
        type: 'scheduled',
        prnMax: 4,
        pillsTotal: '',
        expiryDate: '',
        boxId: null,
        brandNames: Array.isArray(parsed.brandNames) ? parsed.brandNames : [],
        category: parsed.category || '',
        description: parsed.description || '',
        conditions: Array.isArray(parsed.conditions) ? parsed.conditions : [],
        recommendations: Array.isArray(parsed.recommendations) ? parsed.recommendations : [],
        warnings: Array.isArray(parsed.warnings) ? parsed.warnings : []
      };
    }
    state.view = 'confirm';
    render();
    if (!state.scanError) checkAllergyConflict(true);
  }).catch(function(err){
    console.error('[analyzePhoto]', err);
    state.scanError = true;
    state.scanErrorDetail = (err && err.message) || String(err);
    state.extracted = { name:'', dosage:'', instructions:'', selectedTimes:[], type:'scheduled', prnMax:4, pillsTotal:'', expiryDate:'', boxId:null, brandNames:[], category:'', description:'', conditions:[], recommendations:[], warnings:[] };
    state.view = 'confirm';
    render();
  });
}

var CHECKIN_SYSTEM_PROMPT = 'You are a warm, patient daily wellness check-in companion inside a medication reminder app for an older adult. ' +
  'Your only job right now is to ask in simple, short, conversational sentences (1-3 sentences per turn, easy to read or hear aloud) whether they are having any pain or discomfort today. ' +
  'If they mention pain, ask at most one or two gentle follow-up questions to get a general sense of where it is and how it feels (mild, moderate, or severe) - keep it conversational, not like a form. ' +

  '{"severity":"none|mild|moderate|severe","summary":"one short, plain, factual sentence describing what they reported, written in third person for a medical note"}. ' +

function checkInteractions(){
  if (!state.apiKey){
    alert('Add a Google Gemini API key in Settings to check for interactions.');
    return;
  }
  if (state.meds.length < 2){
    state.interactionCheck = { busy: false, results: [], error: null };
    render();
    return;
  }
  state.interactionCheck = { busy: true, results: null, error: null };
  render();
  var list = state.meds.map(function(m, i){
    var line = (i + 1) + '. ' + m.name + (m.dosage ? (' ' + m.dosage) : '');
    if (m.category) line += ' — ' + m.category;
    return line;
  }).join('\n');
  var prompt = 'You are reviewing a patient\'s current medication list for potential drug-drug interactions ' +
    'and therapeutic duplications (for example, two medications from the same drug class). ' +
    'Current medications:\n' + list + '\n\n' +
    'Respond with ONLY a JSON object, no markdown fences, in exactly this shape: ' +
    '{"findings":[{"severity":"mild|moderate|severe","medications":["Med A","Med B"],"summary":"one short sentence explaining the concern"}]}. ' +
    'Only include findings that are real, clinically relevant concerns for this specific list. ' +
    'If there are no notable interactions or duplications among these medications, return {"findings":[]}. ' +
    'This is general reference information only, not a substitute for a pharmacist or physician review.';
  callGemini('', [{ role: 'user', content: prompt }], 700, true).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    if (!parsed || !Array.isArray(parsed.findings)){
      state.interactionCheck = { busy: false, results: null, error: 'Could not read the response. Please try again.' };
    } else {
      state.interactionCheck = { busy: false, results: parsed.findings, error: null };
    }
    render();
  }).catch(function(err){
    state.interactionCheck = { busy: false, results: null, error: (err && err.message) || 'Something went wrong.' };
    render();
  });
}

function interactionCheckCardHtml(){

      '<div class="row-actions"><button class="btn btn-secondary btn-small" onclick="checkInteractions()">Check again</button></div>';

function checkAllergyConflict(silent){
  var nameEl = document.getElementById('f-name');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name){
    if (!silent) alert('Enter the medication name first.');
    return;
  }
  if (!state.apiKey){
    if (!silent) alert('Add a Google Gemini API key in Settings to check for allergy conflicts.');
    return;
  }
  if (!state.allergies){
    if (!silent) alert('Add your known allergies in Settings first, then check again.');
    return;
  }
  var categoryEl = document.getElementById('f-category');
  var category = categoryEl ? categoryEl.value.trim() : (state.extracted && state.extracted.category) || '';
  state.allergyCheck = { busy: true, risk: null, explanation: null, error: null };
  render();
  var prompt = 'A patient has these known allergies: ' + state.allergies + '. ' +
    'They are about to start taking this medication: ' + name + (category ? (' (' + category + ')') : '') + '. ' +
    'Consider both direct allergy matches and known cross-reactivity within drug classes (for example, a penicillin ' +
    'allergy and cross-reactivity with certain cephalosporins). ' +
    'Respond with ONLY a JSON object, no markdown fences, in exactly this shape: ' +
    '{"risk":"none|possible|high","explanation":"one short sentence explaining the reasoning"}. ' +
    'This is general reference information only, not a substitute for a pharmacist or physician review.';
  callGemini('', [{ role: 'user', content: prompt }], 400, true).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    if (!parsed || !parsed.risk){
      state.allergyCheck = { busy: false, risk: null, explanation: null, error: 'Could not read the response. Please try again.' };
    } else {
      state.allergyCheck = { busy: false, risk: parsed.risk, explanation: parsed.explanation || '', error: null };
    }
    render();
  }).catch(function(err){
    state.allergyCheck = { busy: false, risk: null, explanation: null, error: (err && err.message) || 'Something went wrong.' };
    render();
  });

function lookupMedInfo(){

function callGemini(system, messages, maxTokens, jsonMode){
  if (!state.apiKey){
    return Promise.reject(new Error('No API key set'));
  }
  var contents = messages.map(function(m){
    return { role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] };
  });
  var generationConfig = { maxOutputTokens: maxTokens || 300, thinkingConfig: { thinkingBudget: 0 } };
  if (jsonMode) generationConfig.responseMimeType = 'application/json';
  var body = { contents: contents, generationConfig: generationConfig };
  if (system) body.systemInstruction = { parts: [{ text: system }] };
  return fetch(GEMINI_ENDPOINT, {
    method: 'POST',
    headers: geminiHeaders(),
    body: JSON.stringify(body)
  }).then(function(res){
    if (!res.ok){
      return res.json().catch(function(){ return null; }).then(function(errBody){
        var msg = (errBody && errBody.error && errBody.error.message) || ('HTTP ' + res.status);
        throw new Error(msg);
      });
    }
    return res.json();
  }).then(function(data){
    return geminiText(data);
  });
}

function openCheckin(isFallback){

  state.checkin = { messages: [{ role: 'assistant', text: opening }], ended: false, busy: false };

function sendCheckinMessage(){
  var box = document.getElementById('f-checkin-input');
  var text = box ? box.value.trim() : '';
  if (!text || state.checkin.busy) return;
  state.checkin.messages.push({ role: 'user', text: text });
  if (!state.apiKey){
    state.checkin.messages.push({ role: 'assistant', text: "I can't reply yet — no Google Gemini API key is set. Add one in Settings, or tap \"End check-in\" below to finish without the chat." });
    if (box) box.value = '';
    render();
    return;
  }
  state.checkin.busy = true;
  render();
  callGemini(CHECKIN_SYSTEM_PROMPT, getApiMessages(), 300).then(function(text){
    var reply = text || "Thanks for telling me that.";
    state.checkin.messages.push({ role: 'assistant', text: reply });
    state.checkin.busy = false;
    render();
    speakText(reply);
  }).catch(function(err){
    state.checkin.messages.push({ role: 'assistant', text: "Sorry, I had trouble connecting just now (" + ((err && err.message) || 'unknown error') + "). You can try again, or finish the check-in below." });
    state.checkin.busy = false;
    render();
  });
}

function endCheckin(){
  if (state.checkin.busy) return;
  state.checkin.busy = true;
  render();
  var apiMsgs = getApiMessages();
  if (apiMsgs.length === 0){
    finishCheckin('none', 'No pain or discomfort reported today.');
    return;
  }
  callGemini(CHECKIN_SUMMARY_PROMPT, apiMsgs, 200, true).then(function(text){
    var cleaned = (text || '').replace(/```json|```/g, '').trim();
    var parsed;
    try { parsed = JSON.parse(cleaned); } catch (e) { parsed = null; }
    var severity = (parsed && parsed.severity) || 'mild';
    var summary = (parsed && parsed.summary) || 'Reported some discomfort today.';
    finishCheckin(severity, summary);
  }).catch(function(){
    finishCheckin('mild', 'Reported some discomfort today; could not generate a full summary.');
  });
}

function finishCheckin(severity, summary){
  state.checkin.busy = false;
  state.checkin.ended = true;
  var today = todayKey();
  state.checkinLog[today] = { severity: severity, summary: summary };
  state.healthLog.unshift({ id: Date.now(), dateLabel: todayDateLabel(), severity: severity, text: summary, source: 'checkin' });
  var relevantPrn = severity !== 'none' ? state.meds.filter(function(m){ return m.type === 'prn'; }) : [];
  state.checkinResult = { severity: severity, summary: summary, prnMeds: relevantPrn };
  state.view = 'checkin-result';
  render();
  if (severity !== 'none'){
    speakText("Thanks for sharing that. I've added it to your health notes" + (relevantPrn.length ? ", and I'll show you your as-needed medication details now." : "."));
  } else {
    speakText("Glad to hear it. Have a great day!");
  }
}

function computeAge(dobStr){
  if (!dobStr) return null;
  var dob = new Date(dobStr + 'T00:00:00');
  if (isNaN(dob.getTime())) return null;
  var today = new Date();
  var age = today.getFullYear() - dob.getFullYear();
  var m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  return age;
}

function SpeechRecognitionSupported(){
  return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
}
var recognition = null;
function toggleListening(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  if (state.listening){
    if (recognition) recognition.stop();
    return;
  }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onstart = function(){ state.listening = true; render(); };
  recognition.onend = function(){ state.listening = false; render(); };
  recognition.onerror = function(){ state.listening = false; render(); };
  recognition.onresult = function(event){
    var transcript = event.results[0][0].transcript;
    var box = document.getElementById('f-checkin-input');
    if (box) box.value = transcript;
  };
  recognition.start();
}

function speakText(text){
  if (!state.voiceEnabled || !('speechSynthesis' in window)) return;
  try {
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    window.speechSynthesis.speak(utter);
  } catch (e) { /* speech not available */ }
}

    '<span class="welcome-float f1">'+stethoscope+'</span>' +
    '<span class="welcome-float f2">'+heart+'</span>' +
    '<div class="welcome-medallion">'+medallion+'</div>' +
  '</div>';
}

function welcomeFeatureHtml(icon, title, note){
  return '<div class="welcome-feature">' +
    '<div class="welcome-feature-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+icon+'</svg></div>' +
    '<div><div class="welcome-feature-text">'+title+'</div><div class="welcome-feature-note">'+note+'</div></div>' +
  '</div>';
}

var lastWelcome = { shown: false, step: -1 };
function renderWelcome(){
  var slot = document.getElementById('welcomeSlot');
  if (state.onboarded){
    slot.innerHTML = '';
    lastWelcome.shown = false;
    lastWelcome.step = -1;
    return;
  }
  var step = state.welcomeStep || 0;
  // Animate on first show (cascade) and on step change (directional slide);
  // same-step re-renders (e.g. tapping a text-size chip) stay static.
  var animClass = '';
  if (!lastWelcome.shown) animClass = ' w-cascade';
  else if (step > lastWelcome.step) animClass = ' w-fwd';
  else if (step < lastWelcome.step) animClass = ' w-back';
  lastWelcome.shown = true;
  lastWelcome.step = step;
  var dots = [0,1,2].map(function(i){
    return '<div class="welcome-dot'+(i===step?' active':'')+'"></div>';
  }).join('');
  var body;
  if (step === 0){
    body =
      welcomeHeroHtml() +
      '<h1 class="welcome-title">Welcome to GitPill</h1>' +
      '<p class="welcome-sub">A calmer way to stay on top of your medications — reminders, refills, and a daily check-in, all in one place.</p>' +
      '<div class="welcome-features">' +
        welcomeFeatureHtml('<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>', 'Timely reminders', 'A gentle nudge for every dose, on schedule.') +
        welcomeFeatureHtml('<rect x="3" y="6" width="18" height="14" rx="2"/><circle cx="12" cy="13" r="3.5"/>', 'Scan any label', 'Point your camera and we read the bottle for you.') +
        welcomeFeatureHtml('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', 'Keep family in the loop', 'Optional texts if a dose is ever missed.') +
      '</div>' +
      '<div class="welcome-spacer"></div>' +
      '<div class="welcome-actions">' +
        '<button class="btn btn-primary" onclick="goWelcomeStep(1)">Get started</button>' +
        '<button class="btn btn-ghost" onclick="skipWelcome()">Skip for now</button>' +
      '</div>';
  } else if (step === 1){
    var sizes = [['small','Small'],['standard','Standard'],['large','Large'],['xl','Extra large']];
    var sizeChips = sizes.map(function(s){
      return '<button class="chip '+(state.textSize===s[0]?'selected':'')+'" onclick="setWelcomeTextSize(\''+s[0]+'\')">'+s[1]+'</button>';
    }).join('');
    body =
      '<h2 class="welcome-step-title">First, the basics</h2>' +
      '<p class="welcome-step-sub">So GitPill can greet you and show text at a size that is comfortable to read.</p>' +
      '<label class="field-label" style="margin-top:0;">What should we call you?</label>' +
      '<input type="text" id="w-name" placeholder="e.g. Sam" value="'+escapeAttr(state.userName)+'" autocomplete="given-name">' +
      '<label class="field-label">Text size — pick what is easiest to read</label>' +
      '<div class="size-row">'+sizeChips+'</div>' +
      '<div class="welcome-spacer"></div>' +
      '<div class="welcome-nav">' +
        '<button class="btn btn-back" onclick="goWelcomeStep(0)">Back</button>' +
        '<button class="btn btn-primary" onclick="goWelcomeStep(2)">Continue</button>' +
      '</div>';
  } else {
    body =
      '<h2 class="welcome-step-title">A little about you</h2>' +
      '<p class="welcome-step-sub">All optional — you can add or change any of this later in Settings.</p>' +
      '<label class="field-label" style="margin-top:0;">Known allergies</label>' +
      '<input type="text" id="w-allergies" placeholder="e.g. Penicillin, Peanuts" value="'+escapeAttr(state.allergies)+'">' +
      '<label class="field-label">Emergency contact name</label>' +
      '<input type="text" id="w-ec-name" placeholder="e.g. Jordan (daughter)" value="'+escapeAttr(state.emergencyContactName)+'">' +
      '<label class="field-label">Emergency contact phone</label>' +
      '<input type="tel" id="w-ec-phone" placeholder="e.g. (555) 123-4567" value="'+escapeAttr(state.emergencyContactPhone)+'">' +
      '<div class="welcome-spacer"></div>' +
      '<div class="welcome-nav">' +
        '<button class="btn btn-back" onclick="goWelcomeStep(1)">Back</button>' +
        '<button class="btn btn-primary" onclick="finishWelcome()">Finish setup</button>' +
      '</div>';
  }
  slot.innerHTML =
    '<div class="welcome'+animClass+'"><div class="welcome-inner">' +
      '<div class="welcome-dots">'+dots+'</div>' +
      body +
    '</div></div>';
}

var lastRenderedView = null;
function render(){
  // Entrance animations fire on view change only — re-renders within a view
  // (toggles, marking doses, chat) must not replay them.
  var viewChanged = state.view !== lastRenderedView;
  lastRenderedView = state.view;
  document.getElementById('screen').classList.toggle('view-enter', viewChanged);
  renderWelcome();
  renderTabbar();
  if (state.view === 'home') renderHome();
  else if (state.view === 'scan') renderScan();
  else if (state.view === 'analyzing') renderAnalyzing();
  else if (state.view === 'confirm') renderConfirm();
  else if (state.view === 'settings') renderSettings();
  else if (state.view === 'checkin') renderCheckin();
  else if (state.view === 'checkin-result') renderCheckinResult();
  else if (state.view === 'healthlog') renderHealthLog();
  else if (state.view === 'history') renderHistory();
  renderOverlay();
}

applyTheme(state.theme);
</script>
</body>
</html>
